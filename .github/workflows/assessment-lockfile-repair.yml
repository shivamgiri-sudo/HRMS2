name: Assessment Lockfile Repair

on:
  push:
    branches:
      - feat/ats-candidate-assessment-engine

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/ats-candidate-assessment-engine
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Regenerate npm lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Regenerate Bun lockfile
        run: bun install --lockfile-only --save-text-lockfile
      - name: Verify frozen installs
        run: |
          npm ci --ignore-scripts
          rm -rf node_modules
          bun install --frozen-lockfile --ignore-scripts
      - name: Commit regenerated lockfiles
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json bun.lock; then
            echo 'Lockfiles already synchronized.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json bun.lock
          git commit -m 'chore(ci): synchronize root lockfiles'
          git push origin HEAD:feat/ats-candidate-assessment-engine
