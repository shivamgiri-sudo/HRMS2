name: Assessment Backend Diagnostic

on:
  push:
    branches:
      - feat/ats-candidate-assessment-engine
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Capture TypeScript output
        working-directory: backend
        shell: bash
        run: |
          set +e
          npm run typecheck > ../assessment-backend-typecheck.log 2>&1
          code=$?
          echo "$code" > ../assessment-backend-typecheck.exit
          cat ../assessment-backend-typecheck.log
          exit 0
      - name: Capture focused tests
        working-directory: backend
        shell: bash
        run: |
          set +e
          npx vitest run src/modules/ats-assessment/__tests__ > ../assessment-backend-tests.log 2>&1
          code=$?
          echo "$code" > ../assessment-backend-tests.exit
          cat ../assessment-backend-tests.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: assessment-backend-diagnostics
          path: |
            assessment-backend-typecheck.log
            assessment-backend-typecheck.exit
            assessment-backend-tests.log
            assessment-backend-tests.exit
          retention-days: 2
      - name: Enforce result
        shell: bash
        run: |
          test "$(cat assessment-backend-typecheck.exit)" = "0"
          test "$(cat assessment-backend-tests.exit)" = "0"
