name: Apply Finance Budget Integration

on:
  push:
    branches:
      - feat/finance-budget-grn-vendor-flow
    paths:
      - .github/scripts/apply_finance_budget_integration.py
      - .github/workflows/apply-finance-budget-integration.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: finance-budget-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/finance-budget-grn-vendor-flow
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Apply guarded integration patch
        run: python3 .github/scripts/apply_finance_budget_integration.py

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Budget calculation tests
        run: npm --prefix backend exec vitest run src/modules/process-pnl/__tests__/branch-budget.calculation.test.ts

      - name: Build frontend and backend
        run: npm run build:all

      - name: Commit validated integration
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: integrate branch budgets with staged GRN vendor flow"
          git push origin HEAD:feat/finance-budget-grn-vendor-flow
