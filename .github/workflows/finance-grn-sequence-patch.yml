name: Integrate atomic GRN allocator

on:
  push:
    branches:
      - "feat/finance-budget-grn-vendor-flow"

permissions:
  contents: write

concurrency:
  group: finance-grn-sequence-patch
  cancel-in-progress: false

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/finance-budget-grn-vendor-flow
          fetch-depth: 0

      - name: Apply exact GRN allocator patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("backend/src/modules/finance/grn.service.ts")
          text = path.read_text(encoding="utf-8")
          if 'from "./grn-number.service.js"' in text:
              print("Atomic GRN allocator already integrated")
              raise SystemExit(0)

          import_anchor = 'import { vendorPaymentService } from "./vendor-payment.service.js";\n'
          if import_anchor not in text:
              raise SystemExit("GRN service import anchor not found")
          text = text.replace(
              import_anchor,
              import_anchor + 'import { allocateGrnNumber } from "./grn-number.service.js";\n',
              1,
          )

          old_function = '''async function generateGrnNumber(branchId: string, financialYear: string): Promise<string> {
            const [branchRows] = await db.execute<RowDataPacket[]>(
              `SELECT branch_seq FROM branch_master WHERE id = ? LIMIT 1`,
              [branchId]
            );
            if (!branchRows[0]) throw new Error("Selected branch was not found");

            const branchSeq = Number(branchRows[0].branch_seq ?? 0);
            const yy = financialYear.slice(2, 4);
            const [sequenceRows] = await db.execute<RowDataPacket[]>(
              `SELECT COUNT(*) AS cnt
                 FROM grn_request
                WHERE branch_id = ? AND financial_year = ?`,
              [branchId, financialYear]
            );
            return `Mas/${branchSeq}/${yy}/${Number(sequenceRows[0]?.cnt ?? 0) + 1}`;
          }

          '''
          if old_function not in text:
              raise SystemExit("Legacy GRN number function anchor not found")
          text = text.replace(old_function, "", 1)

          old_call = "const grnNumber = await generateGrnNumber(payload.branchId, financialYear);"
          new_call = "const grnNumber = await allocateGrnNumber(payload.branchId, financialYear);"
          if old_call not in text:
              raise SystemExit("Legacy GRN allocation call not found")
          text = text.replace(old_call, new_call, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Finance tests
        run: npm --prefix backend exec vitest run src/modules/process-pnl/__tests__/branch-budget.calculation.test.ts src/modules/finance/__tests__/finance.schema-contract.test.ts

      - name: Commit validated integration
        run: |
          if git diff --quiet; then
            echo "No patch required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/src/modules/finance/grn.service.ts
          git commit -m "fix(finance): allocate GRN numbers atomically"
          git push origin HEAD:feat/finance-budget-grn-vendor-flow
