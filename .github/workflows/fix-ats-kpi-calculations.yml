name: Fix ATS KPI calculations

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - agent/fix-ats-kpi-calculations

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-ats-kpi-calculations
          fetch-depth: 0

      - name: Patch KPI logic and presentation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"Missing expected block: {label}")
              return text.replace(old, new, 1)

          backend_path = Path("backend/src/modules/ats/recruiter-hiring.service.ts")
          backend = backend_path.read_text(encoding="utf-8")

          backend = replace_once(
              backend,
              "  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n}",
              "  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n  followupDueCount: number;\n}",
              "analytics interface follow-up count",
          )

          dashboard_start = backend.index("export async function getHiringDashboard(")
          dashboard_end = backend.index("\nexport async function getCallingDashboard", dashboard_start)
          new_dashboard = r'''export async function getHiringDashboard(userId: string, role: string | undefined, filters: HiringFilters): Promise<HiringDashboard> {
            const scopedOnly = !["admin", "hr", "super_admin"].includes(role ?? "");
            const { sql, params } = await applyActivityFilters(filters, scopedOnly, userId);

            // KPI stages are cumulative: reaching a later stage proves every earlier stage.
            // This prevents cards such as Selected > Walk-ins or Joined > Selected when
            // historical/imported rows have incomplete raw flags.
            const IS_JOINED = `joined_flag = 1`;
            const IS_SELECTED = `(final_selection_flag = 1 OR ${IS_JOINED})`;
            const IS_WALKIN = `(walkin_flag = 1 OR ${IS_SELECTED})`;
            const IS_SHORTLISTED = `(
              LOWER(TRIM(COALESCE(recruiter_remarks, ''))) = 'shortlisted'
              OR LOWER(TRIM(COALESCE(recruiter_remarks, ''))) LIKE 'interested%'
              OR LOWER(TRIM(COALESCE(recruiter_remarks, ''))) LIKE '%will visit%'
              OR LOWER(TRIM(COALESCE(current_status, ''))) IN ('shortlisted', 'expected walk-in')
              OR ${IS_WALKIN}
            )`;
            const IS_CONTACTED = `(contacted_flag = 1 OR ${IS_SHORTLISTED})`;

            const [summary] = await db.execute<DashboardSummaryRow[]>(
              `SELECT
                  COUNT(*) AS total_records,
                  SUM(CASE WHEN ${IS_CONTACTED} THEN 1 ELSE 0 END) AS total_contacted,
                  SUM(CASE WHEN NOT (${IS_CONTACTED}) THEN 1 ELSE 0 END) AS not_contacted,
                  SUM(CASE WHEN ${IS_SHORTLISTED} THEN 1 ELSE 0 END) AS shortlisted,
                  SUM(CASE WHEN LOWER(recruiter_remarks) IN ('rejected', 'rejected (recruiter decision)') THEN 1 ELSE 0 END) AS recruiter_rejected,
                  SUM(CASE WHEN hr_interview_status = 'Selected' THEN 1 ELSE 0 END) AS hr_selected,
                  SUM(CASE WHEN hr_interview_status = 'Rejected' THEN 1 ELSE 0 END) AS hr_rejected,
                  SUM(CASE WHEN ai_interview_result IN ('Selected','Pass') THEN 1 ELSE 0 END) AS ai_selected,
                  SUM(CASE WHEN ai_interview_result IN ('Rejected','Fail') THEN 1 ELSE 0 END) AS ai_rejected,
                  SUM(CASE WHEN ops_interview_status = 'Selected' THEN 1 ELSE 0 END) AS ops_selected,
                  SUM(CASE WHEN ops_interview_status = 'Rejected' THEN 1 ELSE 0 END) AS ops_rejected,
                  SUM(CASE WHEN ${IS_SELECTED} THEN 1 ELSE 0 END) AS final_selected,
                  SUM(CASE WHEN offer_letter_status IN ('Issued','Sent','Offer Issued','Offer Sent') THEN 1 ELSE 0 END) AS offer_letter_issued,
                  SUM(CASE WHEN ${IS_JOINED} THEN 1 ELSE 0 END) AS joined,
                  SUM(CASE WHEN joining_status IN ('Pending','Joining Pending','Offer Accepted') THEN 1 ELSE 0 END) AS joining_pending,
                  SUM(CASE WHEN ${IS_WALKIN} THEN 1 ELSE 0 END) AS walkins,
                  SUM(CASE WHEN hiring_source = 'Employee Referral' THEN 1 ELSE 0 END) AS employee_referrals,
                  COUNT(DISTINCT recruiter_name_snapshot) AS active_recruiters,
                  COUNT(DISTINCT CASE WHEN updated_at < DATE_SUB(NOW(), INTERVAL 2 DAY) THEN recruiter_name_snapshot END) AS recruiter_inactive_count
                FROM ats_recruiter_hiring_activity
                WHERE COALESCE(is_followup_attempt, 0) = 0 AND ${sql}`,
              params
            );

            const metrics = {
              total_records: Number(summary[0]?.total_records ?? 0),
              total_contacted: Number(summary[0]?.total_contacted ?? 0),
              contacted_pct: 0,
              contact_rate: 0,
              shortlist_rate: 0,
              walkin_rate: 0,
              selection_rate: 0,
              join_rate: 0,
              not_contacted: Number(summary[0]?.not_contacted ?? 0),
              shortlisted: Number(summary[0]?.shortlisted ?? 0),
              recruiter_rejected: Number(summary[0]?.recruiter_rejected ?? 0),
              hr_selected: Number(summary[0]?.hr_selected ?? 0),
              hr_rejected: Number(summary[0]?.hr_rejected ?? 0),
              ai_selected: Number(summary[0]?.ai_selected ?? 0),
              ai_rejected: Number(summary[0]?.ai_rejected ?? 0),
              ops_selected: Number(summary[0]?.ops_selected ?? 0),
              ops_rejected: Number(summary[0]?.ops_rejected ?? 0),
              final_selected: Number(summary[0]?.final_selected ?? 0),
              offer_letter_issued: Number(summary[0]?.offer_letter_issued ?? 0),
              joined: Number(summary[0]?.joined ?? 0),
              joining_pending: Number(summary[0]?.joining_pending ?? 0),
              walkins: Number(summary[0]?.walkins ?? 0),
              employee_referrals: Number(summary[0]?.employee_referrals ?? 0),
              active_recruiters: Number(summary[0]?.active_recruiters ?? 0),
              recruiter_inactive_count: Number(summary[0]?.recruiter_inactive_count ?? 0),
            };
            const rate = (numerator: number, denominator: number) => denominator > 0
              ? Math.round((numerator / denominator) * 1000) / 10
              : 0;
            metrics.contact_rate = rate(metrics.total_contacted, metrics.total_records);
            metrics.contacted_pct = metrics.contact_rate;
            metrics.shortlist_rate = rate(metrics.shortlisted, metrics.total_contacted);
            metrics.walkin_rate = rate(metrics.walkins, metrics.total_contacted);
            metrics.selection_rate = rate(metrics.final_selected, metrics.walkins);
            metrics.join_rate = rate(metrics.joined, metrics.final_selected);

            const [byRecruiter, bySource, byProcess, byBranch] = await Promise.all([
              aggregateBy("recruiter_name_snapshot", filters, scopedOnly, userId),
              aggregateBy("hiring_source", filters, scopedOnly, userId),
              aggregateBy("process_name", filters, scopedOnly, userId),
              aggregateBy("branch_name", filters, scopedOnly, userId),
            ]);

            return { metrics, byRecruiter, bySource, byProcess, byBranch };
          }
          '''
          backend = backend[:dashboard_start] + new_dashboard + backend[dashboard_end:]

          backend = replace_once(
              backend,
              "  const IS_JOINED    = `arha.joined_flag = 1`;\n  const IS_SELECTED  = `(arha.final_selection_flag = 1 OR ${IS_JOINED})`;\n  const IS_WALKIN    = `(arha.walkin_flag = 1 OR ${IS_SELECTED})`;\n  const IS_CONTACTED = `(arha.contacted_flag = 1 OR ${IS_WALKIN})`;",
              "  const IS_JOINED    = `arha.joined_flag = 1`;\n  const IS_SELECTED  = `(arha.final_selection_flag = 1 OR ${IS_JOINED})`;\n  const IS_WALKIN    = `(arha.walkin_flag = 1 OR ${IS_SELECTED})`;\n  const IS_SHORTLISTED = `(\n    LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) = 'shortlisted'\n    OR LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) LIKE 'interested%'\n    OR LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) LIKE '%will visit%'\n    OR LOWER(TRIM(COALESCE(arha.current_status, ''))) IN ('shortlisted', 'expected walk-in')\n    OR ${IS_WALKIN}\n  )`;\n  const IS_CONTACTED = `(arha.contacted_flag = 1 OR ${IS_SHORTLISTED})`;",
              "analytics cumulative contacted stage",
          )

          followup_start = backend.index("  // Build follow-up params reusing already-resolved branch")
          followup_end = backend.index("  // Safe wrapper", followup_start)
          backend = backend[:followup_start] + "  const FOLLOWUP_WINDOW = `arha.followup_required = 1\\n    AND arha.followup_date BETWEEN CURDATE() AND DATE_ADD(CURDATE(), INTERVAL 7 DAY)`;\n\n" + backend[followup_end:]

          backend = replace_once(
              backend,
              "    trendRows,\n    followupRows,\n  ] = await Promise.all([",
              "    trendRows,\n    followupRows,\n    followupCountRows,\n  ] = await Promise.all([",
              "analytics promise destructuring",
          )

          old_followup_query = '''    safe(() => db.execute<RowDataPacket[]>(
              `SELECT id, candidate_name, mobile,
                      DATE_FORMAT(followup_date,'%Y-%m-%d') AS followup_date,
                      followup_reason
                 FROM ats_recruiter_hiring_activity
                WHERE ${followupClauses.join(" AND ")}
                ORDER BY followup_date ASC LIMIT 50`,
              followupParams
            ), [] as RowDataPacket[]),'''
          new_followup_query = '''    safe(() => db.execute<RowDataPacket[]>(
              `SELECT arha.id, arha.candidate_name, arha.mobile,
                      DATE_FORMAT(arha.followup_date,'%Y-%m-%d') AS followup_date,
                      arha.followup_reason
                 FROM ats_recruiter_hiring_activity arha
                WHERE ${W} AND ${FOLLOWUP_WINDOW}
                ORDER BY arha.followup_date ASC LIMIT 50`,
              params
            ), [] as RowDataPacket[]),
            safe(() => db.execute<RowDataPacket[]>(
              `SELECT COUNT(*) AS total
                 FROM ats_recruiter_hiring_activity arha
                WHERE ${W} AND ${FOLLOWUP_WINDOW}`,
              params
            ), [] as RowDataPacket[]),'''
          backend = replace_once(backend, old_followup_query, new_followup_query, "filtered follow-up queries")

          backend = replace_once(
              backend,
              "  const followupDue = (followupRows as any[]).map((r) => ({\n    id: String(r.id), candidate_name: String(r.candidate_name ?? \"\"),\n    mobile: String(r.mobile ?? \"\"), followup_date: String(r.followup_date ?? \"\"),\n    followup_reason: String(r.followup_reason ?? \"\"),\n  }));\n\n  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, branchOptions, byGender, byDayOfWeek, trend, followupDue };",
              "  const followupDue = (followupRows as any[]).map((r) => ({\n    id: String(r.id), candidate_name: String(r.candidate_name ?? \"\"),\n    mobile: String(r.mobile ?? \"\"), followup_date: String(r.followup_date ?? \"\"),\n    followup_reason: String(r.followup_reason ?? \"\"),\n  }));\n  const followupDueCount = Number((followupCountRows as any[])[0]?.total ?? 0);\n\n  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, branchOptions, byGender, byDayOfWeek, trend, followupDue, followupDueCount };",
              "analytics follow-up return",
          )

          backend_path.write_text(backend, encoding="utf-8")

          frontend_path = Path("src/pages/NativeATSHiringEntry.tsx")
          frontend = frontend_path.read_text(encoding="utf-8")

          frontend = replace_once(
              frontend,
              "    contacted_pct: number;\n    not_contacted: number;",
              "    contacted_pct: number;\n    contact_rate: number;\n    shortlist_rate: number;\n    walkin_rate: number;\n    selection_rate: number;\n    join_rate: number;\n    not_contacted: number;",
              "dashboard metric rate types",
          )
          frontend = replace_once(
              frontend,
              "  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n};",
              "  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n  followupDueCount: number;\n};",
              "frontend analytics follow-up count type",
          )

          metric_start = frontend.index("function MetricCard({")
          metric_end = frontend.index("\nfunction KpiTile", metric_start)
          new_metric = r'''function MetricCard({
            label, value, icon, unavailable, sub,
          }: {
            label: string; value: string | number; icon: ReactNode; unavailable?: boolean; sub?: string;
          }) {
            return (
              <div className="flex min-h-[78px] items-center gap-3 rounded-xl border border-slate-200 bg-white px-3 py-2.5 shadow-sm">
                <div className={`rounded-lg p-1.5 ${unavailable ? "bg-slate-50 text-slate-300" : "bg-slate-100 text-slate-600"}`}>
                  {icon}
                </div>
                <div className="min-w-0">
                  <div className="truncate text-[10px] font-bold uppercase tracking-[0.16em] text-slate-400">{label}</div>
                  <div className={`text-xl font-black leading-tight ${unavailable ? "text-slate-300" : "text-slate-900"}`}>{value}</div>
                  {sub && !unavailable && <div className="mt-0.5 truncate text-[10px] font-medium text-slate-400">{sub}</div>}
                </div>
              </div>
            );
          }
          '''
          frontend = frontend[:metric_start] + new_metric + frontend[metric_end:]

          rate_block_start = frontend.index("  // ── Totals for tab badge")
          rate_block_end = frontend.index("\n  if (loading)", rate_block_start)
          new_rate_block = r'''  // Header KPI rates use explicit business denominators.
            const dashboardMetrics = dashboard?.metrics;
            const dashboardRate = (key: "contact_rate" | "shortlist_rate" | "walkin_rate" | "selection_rate" | "join_rate") =>
              Number(dashboardMetrics?.[key] ?? 0);
          '''
          frontend = frontend[:rate_block_start] + new_rate_block + frontend[rate_block_end:]

          top_cards_start = frontend.index("        {/* ── Compact metric strip ── */}")
          top_cards_end = frontend.index("\n\n        {/* ── Session Context Panel", top_cards_start)
          new_top_cards = r'''        {/* ── Compact metric strip ── */}
                  <div className="grid grid-cols-2 gap-2 md:grid-cols-3 xl:grid-cols-6">
                    <MetricCard
                      label="Candidate Records"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.total_records ?? 0)}
                      sub="Base entries · follow-up attempts excluded"
                      icon={<PhoneCall className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                    <MetricCard
                      label="Contacted"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.total_contacted ?? 0)}
                      sub={`${dashboardRate("contact_rate")}% of candidate records`}
                      icon={<BadgeCheck className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                    <MetricCard
                      label="Shortlisted"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.shortlisted ?? 0)}
                      sub={`${dashboardRate("shortlist_rate")}% of contacted`}
                      icon={<Target className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                    <MetricCard
                      label="Walk-ins"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.walkins ?? 0)}
                      sub={`${dashboardRate("walkin_rate")}% of contacted`}
                      icon={<Users className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                    <MetricCard
                      label="Selected"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.final_selected ?? 0)}
                      sub={`${dashboardRate("selection_rate")}% of walk-ins`}
                      icon={<UserRound className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                    <MetricCard
                      label="Joined"
                      value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.joined ?? 0)}
                      sub={`${dashboardRate("join_rate")}% of selected`}
                      icon={<Clock3 className="h-4 w-4" />}
                      unavailable={dashboardFailed}
                    />
                  </div>'''
          frontend = frontend[:top_cards_start] + new_top_cards + frontend[top_cards_end:]

          frontend = replace_once(
              frontend,
              "              const totalLogged = analytics.funnel[0]?.count ?? 0;\n              const selPct      = analytics.funnel[3]?.pct ?? 0;\n              const joinPct     = analytics.funnel[4]?.pct ?? 0;\n              const selCount    = analytics.funnel[3]?.count ?? 0;\n              const joinCount   = analytics.funnel[4]?.count ?? 0;",
              "              const funnelStage = (stage: string) => analytics.funnel.find((item) => item.stage === stage);\n              const totalLogged = funnelStage(\"Logged\")?.count ?? 0;\n              const contactedCount = funnelStage(\"Contacted\")?.count ?? 0;\n              const walkinCount = funnelStage(\"Walked In\")?.count ?? 0;\n              const selCount = funnelStage(\"Selected\")?.count ?? 0;\n              const joinCount = funnelStage(\"Joined\")?.count ?? 0;\n              const stageRate = (numerator: number, denominator: number) => denominator > 0\n                ? Math.round((numerator / denominator) * 1000) / 10\n                : 0;\n              const contactRate = stageRate(contactedCount, totalLogged);\n              const walkinRate = stageRate(walkinCount, contactedCount);\n              const selectionRate = stageRate(selCount, walkinCount);\n              const joinRate = stageRate(joinCount, selCount);\n              const followupDueCount = analytics.followupDueCount ?? analytics.followupDue.length;",
              "analytics KPI derived values",
          )

          analytics_kpi_start = frontend.index("                  {/* ── KPI tiles ── */}")
          analytics_kpi_end = frontend.index("\n\n                  {/* ── Visual Hiring Funnel", analytics_kpi_start)
          new_analytics_kpis = r'''                  {/* ── KPI tiles ── */}
                            <div className="grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-6">
                              <KpiTile label="Total Candidates" value={totalLogged.toLocaleString()} sub="logged candidate records" color="border-slate-300" icon={<Users className="h-4 w-4 text-slate-400" />} />
                              <KpiTile label="Contacted" value={contactedCount.toLocaleString()} sub={`${contactRate}% of logged`} color="border-cyan-300" icon={<PhoneCall className="h-4 w-4 text-cyan-500" />} />
                              <KpiTile label="Walk-ins" value={walkinCount.toLocaleString()} sub={`${walkinRate}% of contacted`} color="border-blue-300" icon={<UserRound className="h-4 w-4 text-blue-500" />} />
                              <KpiTile label="Selected" value={selCount.toLocaleString()} sub={`${selectionRate}% of walk-ins`} color="border-emerald-300" icon={<CheckCircle2 className="h-4 w-4 text-emerald-500" />} />
                              <KpiTile label="Joined" value={joinCount.toLocaleString()} sub={`${joinRate}% of selected`} color="border-violet-300" icon={<BadgeCheck className="h-4 w-4 text-violet-500" />} />
                              <KpiTile
                                label="Follow-ups"
                                value={followupDueCount.toLocaleString()}
                                sub="due in the next 7 days"
                                color={followupDueCount > 0 ? "border-amber-400" : "border-slate-200"}
                                icon={<Bell className="h-4 w-4 text-amber-500" />}
                              />
                            </div>'''
          frontend = frontend[:analytics_kpi_start] + new_analytics_kpis + frontend[analytics_kpi_end:]

          frontend = replace_once(
              frontend,
              '<div className="text-xs text-slate-400">Conversion at each stage</div>',
              '<div className="text-xs text-slate-400">Each percentage is measured from total logged candidates</div>',
              "funnel percentage label",
          )
          frontend = frontend.replace(
              "const rate = prev.count > 0 ? Math.round((s.count / prev.count) * 100) : 0;",
              "const rate = prev.count > 0 ? Math.round((s.count / prev.count) * 1000) / 10 : 0;",
          )
          frontend = frontend.replace(
              "{analytics.funnel[0].count > 0 ? Math.round((analytics.funnel[analytics.funnel.length - 1].count / analytics.funnel[0].count) * 100) : 0}%",
              "{analytics.funnel[0].count > 0 ? Math.round((analytics.funnel[analytics.funnel.length - 1].count / analytics.funnel[0].count) * 1000) / 10 : 0}%",
          )
          frontend = frontend.replace(
              "{analytics.funnel[i - 1].count > 0 ? Math.round((s.count / analytics.funnel[i - 1].count) * 100) : 0}%",
              "{analytics.funnel[i - 1].count > 0 ? Math.round((s.count / analytics.funnel[i - 1].count) * 1000) / 10 : 0}%",
          )

          frontend_path.write_text(frontend, encoding="utf-8")
          PY

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend production build
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --ignore-scripts

      - name: Backend typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Verify intended scope
        shell: bash
        run: |
          changed=$(git diff --name-only)
          echo "$changed"
          test "$changed" = $'backend/src/modules/ats/recruiter-hiring.service.ts\nsrc/pages/NativeATSHiringEntry.tsx'

      - name: Commit validated changes and remove temporary files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/fix-ats-kpi-calculations.yml
          rm .github/kpi-fix-trigger.txt
          git add backend/src/modules/ats/recruiter-hiring.service.ts src/pages/NativeATSHiringEntry.tsx .github/workflows/fix-ats-kpi-calculations.yml .github/kpi-fix-trigger.txt
          git commit -m "fix(ats): correct KPI grid calculations"
          git push origin HEAD:agent/fix-ats-kpi-calculations
