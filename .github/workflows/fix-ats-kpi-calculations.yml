name: Fix ATS KPI calculations

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [agent/fix-ats-kpi-calculations]

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ats-kpi-calculations
          fetch-depth: 0

      - name: Patch KPI logic and presentation
        run: |
          python <<'PY'
          from pathlib import Path

          def between(text, start, end, replacement, label):
              a = text.find(start)
              if a < 0: raise SystemExit(f"start marker missing: {label}")
              b = text.find(end, a)
              if b < 0: raise SystemExit(f"end marker missing: {label}")
              return text[:a] + replacement + text[b:]

          def once(text, old, new, label):
              if old not in text: raise SystemExit(f"text missing: {label}")
              return text.replace(old, new, 1)

          bp = Path('backend/src/modules/ats/recruiter-hiring.service.ts')
          b = bp.read_text(encoding='utf-8')

          b = once(b,
            '  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n}',
            '  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n  followupDueCount: number;\n}',
            'backend followupDueCount type')

          dashboard = '''export async function getHiringDashboard(userId: string, role: string | undefined, filters: HiringFilters): Promise<HiringDashboard> {
            const scopedOnly = !["admin", "hr", "super_admin"].includes(role ?? "");
            const { sql, params } = await applyActivityFilters(filters, scopedOnly, userId);

            const IS_JOINED = `joined_flag = 1`;
            const IS_SELECTED = `(final_selection_flag = 1 OR ${IS_JOINED})`;
            const IS_WALKIN = `(walkin_flag = 1 OR ${IS_SELECTED})`;
            const IS_SHORTLISTED = `(
              LOWER(TRIM(COALESCE(recruiter_remarks, ''))) = 'shortlisted'
              OR LOWER(TRIM(COALESCE(recruiter_remarks, ''))) LIKE 'interested%'
              OR LOWER(TRIM(COALESCE(recruiter_remarks, ''))) LIKE '%will visit%'
              OR LOWER(TRIM(COALESCE(current_status, ''))) IN ('shortlisted', 'expected walk-in')
              OR ${IS_WALKIN}
            )`;
            const IS_CONTACTED = `(contacted_flag = 1 OR ${IS_SHORTLISTED})`;

            const [summary] = await db.execute<DashboardSummaryRow[]>(
              `SELECT
                  COUNT(*) AS total_records,
                  SUM(CASE WHEN ${IS_CONTACTED} THEN 1 ELSE 0 END) AS total_contacted,
                  SUM(CASE WHEN NOT (${IS_CONTACTED}) THEN 1 ELSE 0 END) AS not_contacted,
                  SUM(CASE WHEN ${IS_SHORTLISTED} THEN 1 ELSE 0 END) AS shortlisted,
                  SUM(CASE WHEN LOWER(recruiter_remarks) IN ('rejected', 'rejected (recruiter decision)') THEN 1 ELSE 0 END) AS recruiter_rejected,
                  SUM(CASE WHEN hr_interview_status = 'Selected' THEN 1 ELSE 0 END) AS hr_selected,
                  SUM(CASE WHEN hr_interview_status = 'Rejected' THEN 1 ELSE 0 END) AS hr_rejected,
                  SUM(CASE WHEN ai_interview_result IN ('Selected','Pass') THEN 1 ELSE 0 END) AS ai_selected,
                  SUM(CASE WHEN ai_interview_result IN ('Rejected','Fail') THEN 1 ELSE 0 END) AS ai_rejected,
                  SUM(CASE WHEN ops_interview_status = 'Selected' THEN 1 ELSE 0 END) AS ops_selected,
                  SUM(CASE WHEN ops_interview_status = 'Rejected' THEN 1 ELSE 0 END) AS ops_rejected,
                  SUM(CASE WHEN ${IS_SELECTED} THEN 1 ELSE 0 END) AS final_selected,
                  SUM(CASE WHEN offer_letter_status IN ('Issued','Sent','Offer Issued','Offer Sent') THEN 1 ELSE 0 END) AS offer_letter_issued,
                  SUM(CASE WHEN ${IS_JOINED} THEN 1 ELSE 0 END) AS joined,
                  SUM(CASE WHEN joining_status IN ('Pending','Joining Pending','Offer Accepted') THEN 1 ELSE 0 END) AS joining_pending,
                  SUM(CASE WHEN ${IS_WALKIN} THEN 1 ELSE 0 END) AS walkins,
                  SUM(CASE WHEN hiring_source = 'Employee Referral' THEN 1 ELSE 0 END) AS employee_referrals,
                  COUNT(DISTINCT recruiter_name_snapshot) AS active_recruiters,
                  COUNT(DISTINCT CASE WHEN updated_at < DATE_SUB(NOW(), INTERVAL 2 DAY) THEN recruiter_name_snapshot END) AS recruiter_inactive_count
                FROM ats_recruiter_hiring_activity
                WHERE COALESCE(is_followup_attempt, 0) = 0 AND ${sql}`,
              params
            );

            const metrics = {
              total_records: Number(summary[0]?.total_records ?? 0),
              total_contacted: Number(summary[0]?.total_contacted ?? 0),
              contacted_pct: 0,
              contact_rate: 0,
              shortlist_rate: 0,
              walkin_rate: 0,
              selection_rate: 0,
              join_rate: 0,
              not_contacted: Number(summary[0]?.not_contacted ?? 0),
              shortlisted: Number(summary[0]?.shortlisted ?? 0),
              recruiter_rejected: Number(summary[0]?.recruiter_rejected ?? 0),
              hr_selected: Number(summary[0]?.hr_selected ?? 0),
              hr_rejected: Number(summary[0]?.hr_rejected ?? 0),
              ai_selected: Number(summary[0]?.ai_selected ?? 0),
              ai_rejected: Number(summary[0]?.ai_rejected ?? 0),
              ops_selected: Number(summary[0]?.ops_selected ?? 0),
              ops_rejected: Number(summary[0]?.ops_rejected ?? 0),
              final_selected: Number(summary[0]?.final_selected ?? 0),
              offer_letter_issued: Number(summary[0]?.offer_letter_issued ?? 0),
              joined: Number(summary[0]?.joined ?? 0),
              joining_pending: Number(summary[0]?.joining_pending ?? 0),
              walkins: Number(summary[0]?.walkins ?? 0),
              employee_referrals: Number(summary[0]?.employee_referrals ?? 0),
              active_recruiters: Number(summary[0]?.active_recruiters ?? 0),
              recruiter_inactive_count: Number(summary[0]?.recruiter_inactive_count ?? 0),
            };
            const rate = (numerator: number, denominator: number) => denominator > 0
              ? Math.round((numerator / denominator) * 1000) / 10
              : 0;
            metrics.contact_rate = rate(metrics.total_contacted, metrics.total_records);
            metrics.contacted_pct = metrics.contact_rate;
            metrics.shortlist_rate = rate(metrics.shortlisted, metrics.total_contacted);
            metrics.walkin_rate = rate(metrics.walkins, metrics.total_contacted);
            metrics.selection_rate = rate(metrics.final_selected, metrics.walkins);
            metrics.join_rate = rate(metrics.joined, metrics.final_selected);

            const [byRecruiter, bySource, byProcess, byBranch] = await Promise.all([
              aggregateBy("recruiter_name_snapshot", filters, scopedOnly, userId),
              aggregateBy("hiring_source", filters, scopedOnly, userId),
              aggregateBy("process_name", filters, scopedOnly, userId),
              aggregateBy("branch_name", filters, scopedOnly, userId),
            ]);
            return { metrics, byRecruiter, bySource, byProcess, byBranch };
          }

          '''
          b = between(b, 'export async function getHiringDashboard(', 'export async function getCallingDashboard', dashboard, 'getHiringDashboard')

          predicates = '''  // Later stages imply every earlier funnel stage. This keeps historical and
            // backfilled records from producing impossible Selected > Walk-in funnels.
            const IS_JOINED    = `arha.joined_flag = 1`;
            const IS_SELECTED  = `(arha.final_selection_flag = 1 OR ${IS_JOINED})`;
            const IS_WALKIN    = `(arha.walkin_flag = 1 OR ${IS_SELECTED})`;
            const IS_SHORTLISTED = `(
              LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) = 'shortlisted'
              OR LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) LIKE 'interested%'
              OR LOWER(TRIM(COALESCE(arha.recruiter_remarks, ''))) LIKE '%will visit%'
              OR LOWER(TRIM(COALESCE(arha.current_status, ''))) IN ('shortlisted', 'expected walk-in')
              OR ${IS_WALKIN}
            )`;
            const IS_CONTACTED = `(arha.contacted_flag = 1 OR ${IS_SHORTLISTED})`;

            const FOLLOWUP_WINDOW = `arha.followup_required = 1
              AND arha.followup_date BETWEEN CURDATE() AND DATE_ADD(CURDATE(), INTERVAL 7 DAY)`;

          '''
          b = between(b, '  // Later stages imply every earlier funnel stage.', '  // Safe wrapper', predicates, 'analytics predicates and followups')

          b = once(b, '    followupRows,\n  ] = await Promise.all([', '    followupRows,\n    followupCountRows,\n  ] = await Promise.all([', 'promise count result')

          qstart = b.find('    safe(() => db.execute<RowDataPacket[]>(\n      `SELECT id, candidate_name, mobile,')
          if qstart < 0: raise SystemExit('follow-up detail query marker missing')
          qend_marker = '    ), [] as RowDataPacket[]),'
          qend = b.find(qend_marker, qstart)
          if qend < 0: raise SystemExit('follow-up detail query end missing')
          qend += len(qend_marker)
          followup_queries = '''    safe(() => db.execute<RowDataPacket[]>(
              `SELECT arha.id, arha.candidate_name, arha.mobile,
                      DATE_FORMAT(arha.followup_date,'%Y-%m-%d') AS followup_date,
                      arha.followup_reason
                 FROM ats_recruiter_hiring_activity arha
                WHERE ${W} AND ${FOLLOWUP_WINDOW}
                ORDER BY arha.followup_date ASC LIMIT 50`,
              params
            ), [] as RowDataPacket[]),
            safe(() => db.execute<RowDataPacket[]>(
              `SELECT COUNT(*) AS total
                 FROM ats_recruiter_hiring_activity arha
                WHERE ${W} AND ${FOLLOWUP_WINDOW}`,
              params
            ), [] as RowDataPacket[]),'''
          b = b[:qstart] + followup_queries + b[qend:]

          b = once(b,
            '  }));\n\n  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, branchOptions, byGender, byDayOfWeek, trend, followupDue };',
            '  }));\n  const followupDueCount = Number((followupCountRows as any[])[0]?.total ?? 0);\n\n  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, branchOptions, byGender, byDayOfWeek, trend, followupDue, followupDueCount };',
            'follow-up count return')
          bp.write_text(b, encoding='utf-8')

          fp = Path('src/pages/NativeATSHiringEntry.tsx')
          f = fp.read_text(encoding='utf-8')
          f = once(f, '    contacted_pct: number;\n    not_contacted: number;', '    contacted_pct: number;\n    contact_rate: number;\n    shortlist_rate: number;\n    walkin_rate: number;\n    selection_rate: number;\n    join_rate: number;\n    not_contacted: number;', 'frontend rate types')
          f = once(f, '  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n};', '  followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];\n  followupDueCount: number;\n};', 'frontend followup count type')

          metric = '''function MetricCard({
            label, value, icon, unavailable, sub,
          }: {
            label: string; value: string | number; icon: ReactNode; unavailable?: boolean; sub?: string;
          }) {
            return (
              <div className="flex min-h-[78px] items-center gap-3 rounded-xl border border-slate-200 bg-white px-3 py-2.5 shadow-sm">
                <div className={`rounded-lg p-1.5 ${unavailable ? "bg-slate-50 text-slate-300" : "bg-slate-100 text-slate-600"}`}>{icon}</div>
                <div className="min-w-0">
                  <div className="truncate text-[10px] font-bold uppercase tracking-[0.16em] text-slate-400">{label}</div>
                  <div className={`text-xl font-black leading-tight ${unavailable ? "text-slate-300" : "text-slate-900"}`}>{value}</div>
                  {sub && !unavailable && <div className="mt-0.5 truncate text-[10px] font-medium text-slate-400">{sub}</div>}
                </div>
              </div>
            );
          }

          '''
          f = between(f, 'function MetricCard({', 'function KpiTile', metric, 'MetricCard')
          rates = '''  // Header KPI rates use explicit business denominators.
            const dashboardMetrics = dashboard?.metrics;
            const dashboardRate = (key: "contact_rate" | "shortlist_rate" | "walkin_rate" | "selection_rate" | "join_rate") =>
              Number(dashboardMetrics?.[key] ?? 0);

          '''
          f = between(f, '  // ── Totals for tab badge', '  if (loading)', rates, 'header rate variables')

          cards = '''        {/* ── Compact metric strip ── */}
                  <div className="grid grid-cols-2 gap-2 md:grid-cols-3 xl:grid-cols-6">
                    <MetricCard label="Candidate Records" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.total_records ?? 0)} sub="Base entries · follow-up attempts excluded" icon={<PhoneCall className="h-4 w-4" />} unavailable={dashboardFailed} />
                    <MetricCard label="Contacted" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.total_contacted ?? 0)} sub={`${dashboardRate("contact_rate")}% of candidate records`} icon={<BadgeCheck className="h-4 w-4" />} unavailable={dashboardFailed} />
                    <MetricCard label="Shortlisted" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.shortlisted ?? 0)} sub={`${dashboardRate("shortlist_rate")}% of contacted`} icon={<Target className="h-4 w-4" />} unavailable={dashboardFailed} />
                    <MetricCard label="Walk-ins" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.walkins ?? 0)} sub={`${dashboardRate("walkin_rate")}% of contacted`} icon={<Users className="h-4 w-4" />} unavailable={dashboardFailed} />
                    <MetricCard label="Selected" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.final_selected ?? 0)} sub={`${dashboardRate("selection_rate")}% of walk-ins`} icon={<UserRound className="h-4 w-4" />} unavailable={dashboardFailed} />
                    <MetricCard label="Joined" value={dashboardFailed ? "—" : formatMetric(dashboardMetrics?.joined ?? 0)} sub={`${dashboardRate("join_rate")}% of selected`} icon={<Clock3 className="h-4 w-4" />} unavailable={dashboardFailed} />
                  </div>

          '''
          f = between(f, '        {/* ── Compact metric strip ── */}', '        {/* ── Session Context Panel', cards, 'header KPI cards')

          derived = '''              const funnelStage = (stage: string) => analytics.funnel.find((item) => item.stage === stage);
              const totalLogged = funnelStage("Logged")?.count ?? 0;
              const contactedCount = funnelStage("Contacted")?.count ?? 0;
              const walkinCount = funnelStage("Walked In")?.count ?? 0;
              const selCount = funnelStage("Selected")?.count ?? 0;
              const joinCount = funnelStage("Joined")?.count ?? 0;
              const stageRate = (numerator: number, denominator: number) => denominator > 0 ? Math.round((numerator / denominator) * 1000) / 10 : 0;
              const contactRate = stageRate(contactedCount, totalLogged);
              const walkinRate = stageRate(walkinCount, contactedCount);
              const selectionRate = stageRate(selCount, walkinCount);
              const joinRate = stageRate(joinCount, selCount);
              const followupDueCount = analytics.followupDueCount ?? analytics.followupDue.length;

              '''
          f = between(f, '              const totalLogged =', '              // ApexCharts: outcome donut', derived, 'analytics KPI variables')

          tiles = '''                  {/* ── KPI tiles ── */}
                            <div className="grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-6">
                              <KpiTile label="Total Candidates" value={totalLogged.toLocaleString()} sub="logged candidate records" color="border-slate-300" icon={<Users className="h-4 w-4 text-slate-400" />} />
                              <KpiTile label="Contacted" value={contactedCount.toLocaleString()} sub={`${contactRate}% of logged`} color="border-cyan-300" icon={<PhoneCall className="h-4 w-4 text-cyan-500" />} />
                              <KpiTile label="Walk-ins" value={walkinCount.toLocaleString()} sub={`${walkinRate}% of contacted`} color="border-blue-300" icon={<UserRound className="h-4 w-4 text-blue-500" />} />
                              <KpiTile label="Selected" value={selCount.toLocaleString()} sub={`${selectionRate}% of walk-ins`} color="border-emerald-300" icon={<CheckCircle2 className="h-4 w-4 text-emerald-500" />} />
                              <KpiTile label="Joined" value={joinCount.toLocaleString()} sub={`${joinRate}% of selected`} color="border-violet-300" icon={<BadgeCheck className="h-4 w-4 text-violet-500" />} />
                              <KpiTile label="Follow-ups" value={followupDueCount.toLocaleString()} sub="due in the next 7 days" color={followupDueCount > 0 ? "border-amber-400" : "border-slate-200"} icon={<Bell className="h-4 w-4 text-amber-500" />} />
                            </div>

          '''
          f = between(f, '                  {/* ── KPI tiles ── */}', '                  {/* ── Visual Hiring Funnel', tiles, 'analytics KPI tiles')
          f = once(f, '<div className="text-xs text-slate-400">Conversion at each stage</div>', '<div className="text-xs text-slate-400">Stage percentages below use total logged candidates</div>', 'funnel pct explanation')
          f = f.replace('Math.round((s.count / prev.count) * 100)', 'Math.round((s.count / prev.count) * 1000) / 10')
          f = f.replace('Math.round((analytics.funnel[analytics.funnel.length - 1].count / analytics.funnel[0].count) * 100)', 'Math.round((analytics.funnel[analytics.funnel.length - 1].count / analytics.funnel[0].count) * 1000) / 10')
          f = f.replace('Math.round((s.count / analytics.funnel[i - 1].count) * 100)', 'Math.round((s.count / analytics.funnel[i - 1].count) * 1000) / 10')
          fp.write_text(f, encoding='utf-8')
          PY

      - run: npm install --legacy-peer-deps --ignore-scripts
      - run: npm run typecheck
      - run: npm run build
      - working-directory: backend
        run: npm install --ignore-scripts
      - working-directory: backend
        run: npm run typecheck

      - name: Verify intended source scope
        run: |
          changed=$(git diff --name-only)
          echo "$changed"
          test "$changed" = $'backend/src/modules/ats/recruiter-hiring.service.ts\nsrc/pages/NativeATSHiringEntry.tsx'

      - name: Commit validated changes and remove temporary files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm .github/workflows/fix-ats-kpi-calculations.yml .github/kpi-fix-trigger.txt
          git add backend/src/modules/ats/recruiter-hiring.service.ts src/pages/NativeATSHiringEntry.tsx .github/workflows/fix-ats-kpi-calculations.yml .github/kpi-fix-trigger.txt
          git commit -m 'fix(ats): correct KPI grid calculations'
          git push origin HEAD:agent/fix-ats-kpi-calculations
