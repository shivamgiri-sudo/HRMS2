name: Assessment Template Builder Wiring

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    if: github.head_ref == 'feat/ats-candidate-assessment-engine'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ats-candidate-assessment-engine
          fetch-depth: 0
      - name: Wire builder route, portal link, and server validation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          routes = Path('backend/src/modules/ats-assessment/assessment.routes.ts')
          text = routes.read_text(encoding='utf-8')
          old = 'import { assessmentAdminPage } from "./assessment.admin.page.js";\nimport { candidateAssessmentPage } from "./assessment.page.js";'
          new = 'import { assessmentAdminPage } from "./assessment.admin.page.js";\nimport { assessmentTemplateBuilderPage } from "./assessment.builder.page.js";\nimport { candidateAssessmentPage } from "./assessment.page.js";'
          if old not in text and 'assessmentTemplateBuilderPage' not in text:
              raise SystemExit('Builder import point not found')
          text = text.replace(old, new, 1)

          anchor = '''assessmentPublicRouter.get("/assessment-admin", (_req, res) => {\n  noStore(res);\n  res.setHeader(\n    "Content-Security-Policy",\n    "default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'self'; base-uri 'self'",\n  );\n  return res.type("html").send(assessmentAdminPage());\n});'''
          addition = anchor + '''\n\nassessmentPublicRouter.get("/assessment-template-builder", (_req, res) => {\n  noStore(res);\n  res.setHeader(\n    "Content-Security-Policy",\n    "default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'self'; base-uri 'self'",\n  );\n  return res.type("html").send(assessmentTemplateBuilderPage());\n});'''
          if '/assessment-template-builder' not in text:
              if anchor not in text:
                  raise SystemExit('Builder route insertion point not found')
              text = text.replace(anchor, addition, 1)
          routes.write_text(text, encoding='utf-8')

          admin = Path('backend/src/modules/ats-assessment/assessment.admin.page.ts')
          text = admin.read_text(encoding='utf-8')
          old = '''<div class="card"><div class="row space"><div><h2>Assessment templates</h2><p class="muted">Built-in templates are versioned. Existing attempts retain their original template version.</p></div><button id="syncTemplates" class="btn">Sync Built-in Templates</button></div><div id="templateTable" class="scroll"></div></div>'''
          new = '''<div class="card"><div class="row space"><div><h2>Assessment templates</h2><p class="muted">Built-in and custom templates are versioned. Existing attempts retain their original template version.</p></div><div class="row"><a class="btn secondary" href="/api/ats-ext/assessment-template-builder">Create Custom Template</a><button id="syncTemplates" class="btn">Sync Built-in Templates</button></div></div><div id="templateTable" class="scroll"></div></div>'''
          if '/assessment-template-builder' not in text:
              if old not in text:
                  raise SystemExit('Admin template builder link point not found')
              text = text.replace(old, new, 1)
          admin.write_text(text, encoding='utf-8')

          service = Path('backend/src/modules/ats-assessment/assessment.service.ts')
          source = service.read_text(encoding='utf-8')
          if 'function validateCustomTemplateDefinition(' not in source:
              start = source.index('export async function createCustomTemplate(')
              end = source.index('\nexport async function listMappings()', start)
              block = r'''function validateCustomTemplateDefinition(input: AssessmentTemplateDefinition) {
  const raw = input as unknown as Record<string, unknown>;
  const processValues = new Set<AssessmentProcess>(["inbound", "outbound", "backoffice", "document", "email"]);
  const roleValues = new Set<AssessmentRole>(["executive", "team_leader", "quality_auditor"]);
  const difficultyValues = new Set(["basic", "intermediate", "advanced"]);
  const experienceValues = new Set(["any", "fresher", "experienced"]);
  const code = String(raw.code ?? "").trim().toUpperCase().replace(/[^A-Z0-9_-]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 100);
  const name = String(raw.name ?? "").trim().slice(0, 255);
  if (code.length < 3 || name.length < 3) throw appError("Template code and name must contain at least three characters", 400, "INVALID_TEMPLATE");
  const process = raw.process as AssessmentProcess;
  const role = raw.role as AssessmentRole;
  const difficulty = String(raw.difficulty ?? "") as AssessmentTemplateDefinition["difficulty"];
  const experienceLevel = String(raw.experienceLevel ?? "any") as AssessmentTemplateDefinition["experienceLevel"];
  if (!processValues.has(process) || !roleValues.has(role)) throw appError("Select a valid assessment process and role", 400, "INVALID_TEMPLATE");
  if (!difficultyValues.has(difficulty) || !experienceValues.has(experienceLevel)) throw appError("Select valid difficulty and experience levels", 400, "INVALID_TEMPLATE");
  const durationMinutes = Number(raw.durationMinutes);
  const passingPercentage = Number(raw.passingPercentage);
  if (!Number.isInteger(durationMinutes) || durationMinutes < 5 || durationMinutes > 180) throw appError("Assessment duration must be between 5 and 180 minutes", 400, "INVALID_TEMPLATE");
  if (!Number.isFinite(passingPercentage) || passingPercentage < 1 || passingPercentage > 100) throw appError("Passing percentage must be between 1 and 100", 400, "INVALID_TEMPLATE");
  const instructions = Array.isArray(raw.instructions) ? raw.instructions.map((item) => String(item).trim()).filter(Boolean) : [];
  if (!instructions.length || instructions.length > 20 || instructions.some((item) => item.length > 500)) throw appError("Provide between 1 and 20 concise candidate instructions", 400, "INVALID_TEMPLATE");
  const rawTyping = (raw.typing ?? {}) as Record<string, unknown>;
  const typingRequired = Boolean(rawTyping.required);
  const typingDuration = Number(rawTyping.durationSeconds ?? 180);
  const minNetWpm = Number(rawTyping.minNetWpm ?? 30);
  const minAccuracy = Number(rawTyping.minAccuracy ?? 92);
  const maxAttempts = Number(rawTyping.maxAttempts ?? 2);
  const passage = typingRequired ? String(rawTyping.passage ?? "").trim() : "";
  if (maxAttempts !== 2) throw appError("Typing attempts must remain fixed at two", 400, "INVALID_TEMPLATE");
  if (!Number.isInteger(typingDuration) || typingDuration < 30 || typingDuration > 900) throw appError("Typing duration must be between 30 and 900 seconds", 400, "INVALID_TEMPLATE");
  if (!Number.isFinite(minNetWpm) || minNetWpm < 1 || minNetWpm > 150) throw appError("Typing net-WPM benchmark must be between 1 and 150", 400, "INVALID_TEMPLATE");
  if (!Number.isFinite(minAccuracy) || minAccuracy < 1 || minAccuracy > 100) throw appError("Typing accuracy benchmark must be between 1 and 100", 400, "INVALID_TEMPLATE");
  if (typingRequired && (passage.length < 80 || passage.length > 5000)) throw appError("A required typing passage must contain 80 to 5,000 characters", 400, "INVALID_TEMPLATE");
  if (!Array.isArray(raw.questions) || raw.questions.length < 1 || raw.questions.length > 100) throw appError("Template must contain between 1 and 100 questions", 400, "INVALID_TEMPLATE");
  const questionIds = new Set<string>();
  const questions: AssessmentQuestionDefinition[] = raw.questions.map((entry, index) => {
    const question = entry as Record<string, unknown>;
    const id = String(question.id ?? "").trim();
    const sectionKey = String(question.sectionKey ?? "").trim();
    const sectionTitle = String(question.sectionTitle ?? "").trim();
    const type = String(question.type ?? "") as AssessmentQuestionDefinition["type"];
    const prompt = String(question.prompt ?? "").trim();
    const questionDifficulty = String(question.difficulty ?? difficulty) as AssessmentQuestionDefinition["difficulty"];
    const marks = Number(question.marks);
    if (!/^[A-Za-z0-9_-]{2,120}$/.test(id) || questionIds.has(id)) throw appError(`Question ${index + 1} has an invalid or duplicate ID`, 400, "INVALID_TEMPLATE");
    questionIds.add(id);
    if (!sectionKey || sectionKey.length > 100 || !sectionTitle || sectionTitle.length > 150) throw appError(`Question ${index + 1} requires a valid section key and title`, 400, "INVALID_TEMPLATE");
    if (!["single", "multi", "text"].includes(type) || !difficultyValues.has(questionDifficulty)) throw appError(`Question ${index + 1} has an invalid type or difficulty`, 400, "INVALID_TEMPLATE");
    if (prompt.length < 10 || prompt.length > 5000 || !Number.isFinite(marks) || marks < 1 || marks > 100) throw appError(`Question ${index + 1} requires a valid prompt and 1 to 100 marks`, 400, "INVALID_TEMPLATE");
    const output: AssessmentQuestionDefinition = { id, sectionKey, sectionTitle, type, prompt, marks, difficulty: questionDifficulty, manualReview: Boolean(question.manualReview) };
    if (type === "single" || type === "multi") {
      const options = Array.isArray(question.options) ? [...new Set(question.options.map((item) => String(item).trim()).filter(Boolean))] : [];
      if (options.length < 2 || options.length > 10 || options.some((item) => item.length > 1000)) throw appError(`Question ${index + 1} must contain 2 to 10 unique options`, 400, "INVALID_TEMPLATE");
      output.options = options;
      if (type === "single") {
        const answer = String(question.correctAnswer ?? "").trim();
        if (!options.includes(answer)) throw appError(`Question ${index + 1} correct answer must match an option`, 400, "INVALID_TEMPLATE");
        output.correctAnswer = answer;
      } else {
        const answers = Array.isArray(question.correctAnswer) ? [...new Set(question.correctAnswer.map((item) => String(item).trim()).filter(Boolean))] : [];
        if (!answers.length || answers.some((answer) => !options.includes(answer))) throw appError(`Question ${index + 1} multiple-choice answers must match its options`, 400, "INVALID_TEMPLATE");
        output.correctAnswer = answers;
      }
      output.manualReview = false;
    } else {
      output.keywords = Array.isArray(question.keywords) ? [...new Set(question.keywords.map((item) => String(item).trim()).filter(Boolean))].slice(0, 50) : [];
      output.manualReview = Boolean(question.manualReview);
    }
    return output;
  });
  return { code, name, process, role, experienceLevel, durationMinutes, passingPercentage, difficulty, instructions, typing: { required: typingRequired, durationSeconds: typingDuration, minNetWpm, minAccuracy, maxAttempts: 2 as const, passage }, questions } satisfies AssessmentTemplateDefinition;
}

export async function createCustomTemplate(definition: AssessmentTemplateDefinition, actorId: string) {
  await ensureReady();
  const validated = validateCustomTemplateDefinition(definition);
  const existing = await rows<TemplateRow>(db, `SELECT * FROM ats_assessment_template WHERE template_code = ? ORDER BY template_version DESC LIMIT 1`, [validated.code]);
  const version = Number(existing[0]?.template_version ?? 0) + 1;
  const hash = contentHash(validated);
  const id = randomUUID();
  await db.execute(`UPDATE ats_assessment_template SET active_status = 0 WHERE template_code = ? AND source_type = 'custom'`, [validated.code]);
  await db.execute(`INSERT INTO ats_assessment_template (id, template_code, template_name, process_key, role_key, experience_level, difficulty_level, duration_minutes, passing_percentage, gate_mode, template_version, content_hash, config_json, source_type, active_status, created_by) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, 'advisory', ?, ?, CAST(? AS JSON), 'custom', 1, ?)`, [id, validated.code, validated.name, validated.process, validated.role, validated.experienceLevel, validated.difficulty, validated.durationMinutes, validated.passingPercentage, version, hash, JSON.stringify(validated), actorId]);
  return { id, code: validated.code, version };
}
'''
              service.write_text(source[:start] + block + source[end:], encoding='utf-8')
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/assessment-template-builder-wiring.yml
      - name: Commit template builder wiring
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/src/modules/ats-assessment/assessment.routes.ts backend/src/modules/ats-assessment/assessment.admin.page.ts backend/src/modules/ats-assessment/assessment.service.ts .github/workflows/assessment-template-builder-wiring.yml
          git commit -m 'feat(ats-assessment): wire validated template builder'
          git push origin HEAD:feat/ats-candidate-assessment-engine
