name: Refine ATS KPI turnout

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [agent/fix-ats-kpi-calculations]

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ats-kpi-calculations
          fetch-depth: 0
      - name: Use shortlisted candidates as turnout denominator
        run: |
          python <<'PY'
          from pathlib import Path
          backend = Path('backend/src/modules/ats/recruiter-hiring.service.ts')
          text = backend.read_text(encoding='utf-8')
          old = 'metrics.walkin_rate = rate(metrics.walkins, metrics.total_contacted);'
          new = 'metrics.walkin_rate = rate(metrics.walkins, metrics.shortlisted);'
          if old not in text:
              raise SystemExit('backend turnout formula marker missing')
          backend.write_text(text.replace(old, new, 1), encoding='utf-8')

          frontend = Path('src/pages/NativeATSHiringEntry.tsx')
          text = frontend.read_text(encoding='utf-8')
          old = 'sub={`${dashboardRate("walkin_rate")}% of contacted`} icon={<Users className="h-4 w-4" />}'
          new = 'sub={`${dashboardRate("walkin_rate")}% of shortlisted`} icon={<Users className="h-4 w-4" />}'
          if old not in text:
              raise SystemExit('frontend turnout label marker missing')
          frontend.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Validate and commit
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          npm run typecheck
          (cd backend && npm install --ignore-scripts && npm run typecheck)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/src/modules/ats/recruiter-hiring.service.ts src/pages/NativeATSHiringEntry.tsx
          git rm -f --ignore-unmatch .github/workflows/finalize-ats-kpi-fix.yml .github/workflows/refine-ats-kpi-turnout.yml
          git commit -m 'fix(ats): use shortlisted turnout denominator'
          git push origin HEAD:agent/fix-ats-kpi-calculations
