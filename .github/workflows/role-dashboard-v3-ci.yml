name: Role Dashboard V3 CI

on:
  push:
    branches:
      - feature/role-dashboards-v3
  pull_request:
    paths:
      - "src/pages/Index.tsx"
      - "src/pages/dashboards/**"
      - "src/pages/SuperAdminDashboardV2.tsx"
      - ".github/workflows/role-dashboard-v3-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend build
        working-directory: backend
        run: npm run build
