name: Role Dashboard V3 CI

on:
  push:
    branches:
      - feature/role-dashboards-v3
  pull_request:
    paths:
      - "src/pages/Index.tsx"
      - "src/pages/dashboards/**"
      - "src/pages/SuperAdminDashboardV2.tsx"
      - "backend/src/modules/dashboards/**"
      - "backend/src/shared/dashboardScope.ts"
      - "backend/src/shared/roleResolver.ts"
      - "backend/src/shared/accessGuard.ts"
      - "backend/scripts/dashboard-data-audit.ts"
      - "tests/roleDashboardAccess.test.ts"
      - "tests/dashboardShellContract.test.ts"
      - ".github/workflows/role-dashboard-v3-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Dashboard unit and shell contract tests
        working-directory: backend
        run: npx vitest --root .. run tests/roleDashboardAccess.test.ts tests/dashboardShellContract.test.ts

      - name: Backend build
        working-directory: backend
        run: npm run build
