name: Apply ATS branch analytics remediation

on:
  push:
    branches:
      - agent/fix-ats-branch-analytics

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source remediation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          service_path = Path('backend/src/modules/ats/recruiter-hiring.service.ts')
          page_path = Path('src/pages/NativeATSHiringEntry.tsx')
          service = service_path.read_text(encoding='utf-8')
          page = page_path.read_text(encoding='utf-8')

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          def regex_once(text: str, pattern: str, replacement: str, label: str) -> str:
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one regex match, found {count}')
              return updated

          # Backend response contract: include canonical branch options and stage conversion metrics.
          service = regex_once(
              service,
              r"export interface HiringActivityAnalytics \{.*?\n\}\n\nexport async function getHiringActivityAnalytics",
              """export interface HiringActivityAnalytics {
            funnel: { stage: string; count: number; pct: number }[];
            byOutcome: { label: string; count: number }[];
            bySource: { label: string; total: number; walkins: number; selected: number; joined: number }[];
            byProcess: { label: string; total: number; walkins: number; selected: number; joined: number }[];
            byRecruiter: { label: string; total: number; walkins: number; selected: number; joined: number; selRate: number }[];
            byBranch: Array<{
              label: string;
              total: number;
              contacted: number;
              walkins: number;
              selected: number;
              joined: number;
              contactRate: number;
              walkinRate: number;
              selectionRate: number;
              joinRate: number;
              overallRate: number;
              volumeSharePct: number;
              dataQualityIssues: string[];
            }>;
            branchOptions: string[];
            byGender: { label: string; count: number; walkins: number; selected: number; joined: number }[];
            byDayOfWeek: { label: string; count: number }[];
            trend: { date: string; logged: number; walkins: number; selected: number }[];
            followupDue: { id: string; candidate_name: string; mobile: string; followup_date: string; followup_reason: string }[];
          }

          export async function getHiringActivityAnalytics""",
              'analytics interface',
          )

          service = replace_once(
              service,
              '  if (filters.branch)      { clauses.push("arha.branch_name LIKE ?");              params.push(`%${filters.branch}%`); }',
              '''  if (filters.branch) {
            clauses.push(`(
              LOWER(TRIM(COALESCE(arha.branch_name, ''))) = LOWER(TRIM(?))
              OR LOWER(TRIM(COALESCE(arha.location_name, ''))) = LOWER(TRIM(?))
              OR EXISTS (
                SELECT 1
                  FROM branch_master bm_filter
                 WHERE LOWER(TRIM(COALESCE(bm_filter.branch_name, ''))) = LOWER(TRIM(?))
                   AND (
                     LOWER(TRIM(COALESCE(arha.branch_name, ''))) IN (
                       LOWER(TRIM(COALESCE(bm_filter.branch_name, ''))),
                       LOWER(TRIM(COALESCE(bm_filter.branch_code, '')))
                     )
                     OR LOWER(TRIM(COALESCE(arha.location_name, ''))) IN (
                       LOWER(TRIM(COALESCE(bm_filter.branch_name, ''))),
                       LOWER(TRIM(COALESCE(bm_filter.branch_code, '')))
                     )
                   )
              )
            )`);
            params.push(filters.branch, filters.branch, filters.branch);
          }''',
              'canonical branch filter',
          )

          service = replace_once(
              service,
              '''  const IS_CONTACTED = `arha.contacted_flag = 1`;
          const IS_WALKIN    = `arha.walkin_flag = 1`;
          const IS_SELECTED  = `arha.final_selection_flag = 1`;
          const IS_JOINED    = `arha.joined_flag = 1`;''',
              '''  // Later stages imply every earlier funnel stage. This keeps the funnel monotonic
          // even when historical rows have stale or partially backfilled flag columns.
          const IS_JOINED    = `arha.joined_flag = 1`;
          const IS_SELECTED  = `(arha.final_selection_flag = 1 OR ${IS_JOINED})`;
          const IS_WALKIN    = `(arha.walkin_flag = 1 OR ${IS_SELECTED})`;
          const IS_CONTACTED = `(arha.contacted_flag = 1 OR ${IS_WALKIN})`;''',
              'monotonic funnel stages',
          )

          service = replace_once(
              service,
              '''    branchRows,
              genderRows,''',
              '''    branchRows,
              branchMasterRows,
              genderRows,''',
              'branch master destructuring',
          )

          service = replace_once(
              service,
              '''    safe(() => db.execute<RowDataPacket[]>(
                `SELECT COALESCE(NULLIF(arha.branch_name,''),'Unknown') AS label,
                        COUNT(*) AS total,
                        SUM(CASE WHEN ${IS_WALKIN}   THEN 1 ELSE 0 END) AS walkins,
                        SUM(CASE WHEN ${IS_SELECTED} THEN 1 ELSE 0 END) AS selected,
                        SUM(CASE WHEN ${IS_JOINED}   THEN 1 ELSE 0 END) AS joined
                   FROM ats_recruiter_hiring_activity arha WHERE ${W}
                   GROUP BY label ORDER BY total DESC LIMIT 20`,
                params
              ), [] as RowDataPacket[]),''',
              '''    safe(() => db.execute<RowDataPacket[]>(
                `SELECT COALESCE(
                          NULLIF(TRIM(arha.branch_name),''),
                          NULLIF(TRIM(arha.location_name),''),
                          'Unmapped'
                        ) AS label,
                        COUNT(*) AS total,
                        SUM(CASE WHEN ${IS_CONTACTED} THEN 1 ELSE 0 END) AS contacted,
                        SUM(CASE WHEN ${IS_WALKIN}    THEN 1 ELSE 0 END) AS walkins,
                        SUM(CASE WHEN ${IS_SELECTED}  THEN 1 ELSE 0 END) AS selected,
                        SUM(CASE WHEN ${IS_JOINED}    THEN 1 ELSE 0 END) AS joined
                   FROM ats_recruiter_hiring_activity arha WHERE ${W}
                   GROUP BY label ORDER BY total DESC LIMIT 100`,
                params
              ), [] as RowDataPacket[]),
              safe(() => db.execute<RowDataPacket[]>(
                `SELECT branch_name, branch_code
                   FROM branch_master
                  WHERE NULLIF(TRIM(branch_name), '') IS NOT NULL
                  ORDER BY branch_name ASC`,
                []
              ), [] as RowDataPacket[]),''',
              'branch aggregation query',
          )

          service = replace_once(
              service,
              "  const byBranch    = (branchRows as any[]).map((r) => ({ label: String(r.label || 'Unknown'), total: Number(r.total) || 0, walkins: Number(r.walkins) || 0, selected: Number(r.selected) || 0, joined: Number(r.joined) || 0 }));",
              '''  const normalizeBranchKey = (value: unknown) => String(value ?? "")
            .trim()
            .toLowerCase()
            .replace(/\b(branch|office|site)\b/g, " ")
            .replace(/[^a-z0-9]+/g, " ")
            .replace(/\s+/g, " ")
            .trim();

          const branchAliases = new Map<string, string>();
          const branchOptionSet = new Set<string>();
          for (const row of branchMasterRows as any[]) {
            const preferred = String(row.branch_name ?? "").trim();
            if (!preferred) continue;
            branchOptionSet.add(preferred);
            const nameKey = normalizeBranchKey(preferred);
            const codeKey = normalizeBranchKey(row.branch_code);
            if (nameKey) branchAliases.set(nameKey, preferred);
            if (codeKey) branchAliases.set(codeKey, preferred);
          }

          const branchAccumulator = new Map<string, {
            label: string;
            total: number;
            contacted: number;
            walkins: number;
            selected: number;
            joined: number;
          }>();
          for (const row of branchRows as any[]) {
            const rawLabel = String(row.label ?? "").trim() || "Unmapped";
            const preferred = branchAliases.get(normalizeBranchKey(rawLabel)) ?? rawLabel.replace(/\s+/g, " ");
            const current = branchAccumulator.get(preferred) ?? {
              label: preferred,
              total: 0,
              contacted: 0,
              walkins: 0,
              selected: 0,
              joined: 0,
            };
            current.total += Number(row.total) || 0;
            current.contacted += Number(row.contacted) || 0;
            current.walkins += Number(row.walkins) || 0;
            current.selected += Number(row.selected) || 0;
            current.joined += Number(row.joined) || 0;
            branchAccumulator.set(preferred, current);
          }

          const rate = (numerator: number, denominator: number) => denominator > 0
            ? Math.round((numerator / denominator) * 1000) / 10
            : 0;
          const byBranch = Array.from(branchAccumulator.values())
            .map((row) => {
              const dataQualityIssues: string[] = [];
              if (row.contacted > row.total) dataQualityIssues.push("Contacted exceeds logged");
              if (row.walkins > row.contacted) dataQualityIssues.push("Walk-ins exceed contacted");
              if (row.selected > row.walkins) dataQualityIssues.push("Selected exceeds walk-ins");
              if (row.joined > row.selected) dataQualityIssues.push("Joined exceeds selected");
              return {
                ...row,
                contactRate: rate(row.contacted, row.total),
                walkinRate: rate(row.walkins, row.contacted),
                selectionRate: rate(row.selected, row.walkins),
                joinRate: rate(row.joined, row.selected),
                overallRate: rate(row.joined, row.total),
                volumeSharePct: rate(row.total, logged),
                dataQualityIssues,
              };
            })
            .sort((a, b) => b.total - a.total || a.label.localeCompare(b.label));
          const branchOptions = Array.from(branchOptionSet).sort((a, b) => a.localeCompare(b));''',
              'canonical branch mapping',
          )

          service = replace_once(
              service,
              '  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, byGender, byDayOfWeek, trend, followupDue };',
              '  return { funnel, byOutcome, bySource, byProcess, byRecruiter, byBranch, branchOptions, byGender, byDayOfWeek, trend, followupDue };',
              'analytics return payload',
          )

          # Frontend analytics contract.
          page = replace_once(
              page,
              '  byBranch: { label: string; total: number; walkins: number; selected: number; joined: number }[];',
              '''  byBranch: Array<{
            label: string;
            total: number;
            contacted: number;
            walkins: number;
            selected: number;
            joined: number;
            contactRate: number;
            walkinRate: number;
            selectionRate: number;
            joinRate: number;
            overallRate: number;
            volumeSharePct: number;
            dataQualityIssues: string[];
          }>;
          branchOptions: string[];''',
              'frontend branch type',
          )

          page = replace_once(
              page,
              '''                  <input type="text" placeholder="All branches" value={aBranch} onChange={(e) => setABranch(e.target.value)}
                            className="h-8 w-full rounded-lg border border-slate-200 bg-slate-50 px-2 text-xs outline-none focus:border-violet-400 focus:bg-white" />''',
              '''                  <select value={aBranch} onChange={(e) => setABranch(e.target.value)}
                            className="h-8 w-full rounded-lg border border-slate-200 bg-slate-50 px-2 text-xs outline-none focus:border-violet-400 focus:bg-white">
                            <option value="">All branches</option>
                            {(analytics?.branchOptions ?? []).map((branch) => (
                              <option key={branch} value={branch}>{branch}</option>
                            ))}
                          </select>''',
              'branch filter selector',
          )

          page = replace_once(
              page,
              '''              return (
                        <>''',
              '''              const branchData = analytics.byBranch ?? [];
                      const highestVolumeBranch = branchData.length
                        ? branchData.reduce((best, row) => row.total > best.total ? row : best)
                        : null;
                      const bestSelectionBranch = branchData
                        .filter((row) => row.walkins > 0)
                        .sort((a, b) => b.selectionRate - a.selectionRate || b.walkins - a.walkins)[0] ?? null;
                      const bestJoinBranch = branchData
                        .filter((row) => row.selected > 0)
                        .sort((a, b) => b.joinRate - a.joinRate || b.selected - a.selected)[0] ?? null;
                      const branchesNeedingReview = branchData.filter((row) => row.dataQualityIssues.length > 0).length;

                      return (
                        <>''',
              'frontend branch summary variables',
          )

          branch_layout = '''
                  {/* ── Row 4: Process Breakdown ── */}
                  <div className="rounded-2xl border border-slate-200 bg-white p-5">
                    <div className="mb-1 text-sm font-black text-slate-900">Process Breakdown</div>
                    <div className="mb-3 text-xs text-slate-400">Candidates per process — logged → walk-in → selected → joined</div>
                    {analytics.byProcess.length === 0 ? (
                      <AnalyticsEmptyState label="No process data" />
                    ) : (
                      <ResponsiveContainer width="100%" height={Math.max(220, analytics.byProcess.length * 40)}>
                        <BarChart data={analytics.byProcess} layout="vertical" margin={{ left: 10, right: 50 }}>
                          <CartesianGrid strokeDasharray="3 3" horizontal={false} />
                          <XAxis type="number" tick={{ fontSize: 10 }} allowDecimals={false} />
                          <YAxis dataKey="label" type="category" tick={{ fontSize: 10 }} width={150} />
                          <Tooltip formatter={(v: number, name: string) => [v.toLocaleString(), name]} />
                          <Legend iconSize={10} wrapperStyle={{ fontSize: 11 }} />
                          <Bar dataKey="total" fill="#94a3b8" name="Logged" radius={[0, 3, 3, 0]} />
                          <Bar dataKey="walkins" fill="#0ea5e9" name="Walk-in" radius={[0, 3, 3, 0]} />
                          <Bar dataKey="selected" fill="#10b981" name="Selected" radius={[0, 3, 3, 0]} />
                          <Bar dataKey="joined" fill="#6366f1" name="Joined" radius={[0, 3, 3, 0]} />
                        </BarChart>
                      </ResponsiveContainer>
                    )}
                  </div>

                  {/* ── Branch Analytics: normalized identity, volume and stage quality ── */}
                  <div className="rounded-2xl border border-slate-200 bg-white p-5">
                    <div className="flex flex-col gap-3 border-b border-slate-100 pb-4 lg:flex-row lg:items-start lg:justify-between">
                      <div>
                        <div className="flex items-center gap-2 text-sm font-black text-slate-900">
                          <BarChart2 className="h-4 w-4 text-violet-500" />
                          Branch Analytics
                        </div>
                        <div className="mt-1 text-xs text-slate-400">
                          Branch names and codes are consolidated before conversion is calculated. Rates are stage-to-stage, not percentages of unrelated totals.
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                        <div className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                          <div className="text-[9px] font-bold uppercase tracking-wide text-slate-400">Branches</div>
                          <div className="text-lg font-black text-slate-900">{branchData.length}</div>
                        </div>
                        <div className="min-w-0 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2">
                          <div className="text-[9px] font-bold uppercase tracking-wide text-slate-400">Highest volume</div>
                          <div className="truncate text-xs font-black text-slate-900">{highestVolumeBranch?.label ?? "—"}</div>
                          <div className="text-[10px] text-slate-500">{highestVolumeBranch ? `${highestVolumeBranch.total} logged` : "No data"}</div>
                        </div>
                        <div className="min-w-0 rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2">
                          <div className="text-[9px] font-bold uppercase tracking-wide text-emerald-600">Best selection</div>
                          <div className="truncate text-xs font-black text-emerald-900">{bestSelectionBranch?.label ?? "—"}</div>
                          <div className="text-[10px] text-emerald-700">{bestSelectionBranch ? `${bestSelectionBranch.selectionRate}% of walk-ins` : "No walk-ins"}</div>
                        </div>
                        <div className={`min-w-0 rounded-xl border px-3 py-2 ${branchesNeedingReview ? "border-amber-300 bg-amber-50" : "border-slate-200 bg-slate-50"}`}>
                          <div className={`text-[9px] font-bold uppercase tracking-wide ${branchesNeedingReview ? "text-amber-600" : "text-slate-400"}`}>Data review</div>
                          <div className={`text-lg font-black ${branchesNeedingReview ? "text-amber-800" : "text-slate-900"}`}>{branchesNeedingReview}</div>
                          <div className="text-[10px] text-slate-500">non-monotonic branches</div>
                        </div>
                      </div>
                    </div>

                    {branchData.length === 0 ? (
                      <AnalyticsEmptyState label="No branch data" />
                    ) : (
                      <div className="mt-4 space-y-5">
                        <div>
                          <div className="mb-2 flex items-center justify-between">
                            <div className="text-xs font-bold text-slate-700">Conversion comparison</div>
                            <div className="text-[10px] text-slate-400">Selection = selected ÷ walk-ins · Join = joined ÷ selected · Overall = joined ÷ logged</div>
                          </div>
                          <ResponsiveContainer width="100%" height={Math.max(240, Math.min(branchData.length, 12) * 42)}>
                            <BarChart data={branchData.slice(0, 12)} layout="vertical" margin={{ left: 10, right: 35 }}>
                              <CartesianGrid strokeDasharray="3 3" horizontal={false} />
                              <XAxis type="number" domain={[0, 100]} tick={{ fontSize: 10 }} tickFormatter={(value: number) => `${value}%`} />
                              <YAxis dataKey="label" type="category" tick={{ fontSize: 10 }} width={135} />
                              <Tooltip formatter={(value: number, name: string) => [`${value}%`, name]} />
                              <Legend iconSize={10} wrapperStyle={{ fontSize: 11 }} />
                              <Bar dataKey="selectionRate" fill="#10b981" name="Selection rate" radius={[0, 3, 3, 0]} />
                              <Bar dataKey="joinRate" fill="#6366f1" name="Join rate" radius={[0, 3, 3, 0]} />
                              <Bar dataKey="overallRate" fill="#8b5cf6" name="Overall conversion" radius={[0, 3, 3, 0]} />
                            </BarChart>
                          </ResponsiveContainer>
                        </div>

                        <div className="overflow-x-auto rounded-xl border border-slate-200">
                          <table className="min-w-[1050px] w-full text-xs">
                            <thead className="bg-slate-50">
                              <tr className="border-b border-slate-200">
                                <th className="px-3 py-2.5 text-left text-[10px] font-bold uppercase tracking-wide text-slate-500">Branch</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Logged</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Contacted</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Walk-in</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Selected</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Joined</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Contact %</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Walk-in %</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Selection %</th>
                                <th className="px-3 py-2.5 text-right text-[10px] font-bold uppercase tracking-wide text-slate-500">Join %</th>
                                <th className="px-3 py-2.5 text-left text-[10px] font-bold uppercase tracking-wide text-slate-500">Validation</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                              {branchData.map((branch) => (
                                <tr key={branch.label} className="hover:bg-slate-50/80">
                                  <td className="px-3 py-2.5">
                                    <div className="max-w-[190px] truncate font-bold text-slate-800" title={branch.label}>{branch.label}</div>
                                    <div className="mt-1 flex items-center gap-2">
                                      <div className="h-1.5 w-20 overflow-hidden rounded-full bg-slate-100">
                                        <div className="h-full rounded-full bg-violet-400" style={{ width: `${Math.min(100, branch.volumeSharePct)}%` }} />
                                      </div>
                                      <span className="text-[10px] text-slate-400">{branch.volumeSharePct}% volume</span>
                                    </div>
                                  </td>
                                  <td className="px-3 py-2.5 text-right font-bold tabular-nums text-slate-800">{branch.total}</td>
                                  <td className="px-3 py-2.5 text-right tabular-nums text-blue-700">{branch.contacted}</td>
                                  <td className="px-3 py-2.5 text-right tabular-nums text-sky-700">{branch.walkins}</td>
                                  <td className="px-3 py-2.5 text-right tabular-nums text-emerald-700">{branch.selected}</td>
                                  <td className="px-3 py-2.5 text-right tabular-nums text-violet-700">{branch.joined}</td>
                                  <td className="px-3 py-2.5 text-right font-bold tabular-nums text-slate-700">{branch.contactRate}%</td>
                                  <td className="px-3 py-2.5 text-right font-bold tabular-nums text-slate-700">{branch.walkinRate}%</td>
                                  <td className="px-3 py-2.5 text-right font-bold tabular-nums text-emerald-700">{branch.selectionRate}%</td>
                                  <td className="px-3 py-2.5 text-right font-bold tabular-nums text-violet-700">{branch.joinRate}%</td>
                                  <td className="px-3 py-2.5">
                                    {branch.dataQualityIssues.length === 0 ? (
                                      <span className="inline-flex rounded-full border border-emerald-200 bg-emerald-50 px-2 py-0.5 text-[10px] font-bold text-emerald-700">Valid</span>
                                    ) : (
                                      <span className="inline-flex rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[10px] font-bold text-amber-700" title={branch.dataQualityIssues.join(", ")}>Review</span>
                                    )}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>

                        {bestJoinBranch && (
                          <div className="rounded-xl border border-violet-100 bg-violet-50 px-3 py-2 text-xs text-violet-800">
                            <span className="font-black">Highest post-selection joining conversion:</span> {bestJoinBranch.label} at {bestJoinBranch.joinRate}% ({bestJoinBranch.joined}/{bestJoinBranch.selected}).
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  {/* ── Row 5: Gender Donut + Recruiter Conversion ── */}'''

          page = regex_once(
              page,
              r"\n\s*\{/\* ── Row 4: Process \+ Branch ── \*/\}.*?\n\s*\{/\* ── Row 5: Gender Donut \+ Recruiter Conversion ── \*/\}",
              '\n' + branch_layout,
              'branch analytics layout',
          )

          service_path.write_text(service, encoding='utf-8')
          page_path.write_text(page, encoding='utf-8')
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      - name: Validate frontend types
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --ignore-scripts

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Check patch hygiene
        run: git diff --check

      - name: Commit remediated source
        shell: bash
        run: |
          rm .github/workflows/agent-fix-ats-branch-analytics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/NativeATSHiringEntry.tsx backend/src/modules/ats/recruiter-hiring.service.ts .github/workflows/agent-fix-ats-branch-analytics.yml
          git commit -m "fix(ats): correct branch analytics logic and layout"
          git push origin HEAD:agent/fix-ats-branch-analytics
