name: Align ATS KPI funnel stages

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [agent/fix-ats-kpi-calculations]

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ats-kpi-calculations
          fetch-depth: 0
      - name: Add shortlisted to analytics funnel and KPI grid
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'{label} marker missing')
              return text.replace(old, new, 1)

          backend = Path('backend/src/modules/ats/recruiter-hiring.service.ts')
          text = backend.read_text(encoding='utf-8')
          text = replace_once(text,
            '         SUM(CASE WHEN ${IS_CONTACTED} THEN 1 ELSE 0 END)    AS contacted,\n         SUM(CASE WHEN ${IS_WALKIN}    THEN 1 ELSE 0 END)    AS walkins,',
            '         SUM(CASE WHEN ${IS_CONTACTED}   THEN 1 ELSE 0 END) AS contacted,\n         SUM(CASE WHEN ${IS_SHORTLISTED} THEN 1 ELSE 0 END) AS shortlisted,\n         SUM(CASE WHEN ${IS_WALKIN}      THEN 1 ELSE 0 END) AS walkins,',
            'analytics summary stages')
          text = replace_once(text,
            '  const contacted = Number(s.contacted ?? 0);\n  const walkins   = Number(s.walkins   ?? 0);',
            '  const contacted  = Number(s.contacted  ?? 0);\n  const shortlisted = Number(s.shortlisted ?? 0);\n  const walkins    = Number(s.walkins    ?? 0);',
            'analytics stage mapping')
          text = replace_once(text,
            '    { stage: "Contacted", count: contacted, pct: pct(contacted) },\n    { stage: "Walked In", count: walkins,   pct: pct(walkins)   },',
            '    { stage: "Contacted",  count: contacted,   pct: pct(contacted)   },\n    { stage: "Shortlisted", count: shortlisted, pct: pct(shortlisted) },\n    { stage: "Walked In",  count: walkins,     pct: pct(walkins)     },',
            'analytics funnel stages')
          backend.write_text(text, encoding='utf-8')

          frontend = Path('src/pages/NativeATSHiringEntry.tsx')
          text = frontend.read_text(encoding='utf-8')
          text = replace_once(text,
            '              const contactedCount = funnelStage("Contacted")?.count ?? 0;\n              const walkinCount = funnelStage("Walked In")?.count ?? 0;',
            '              const contactedCount = funnelStage("Contacted")?.count ?? 0;\n              const shortlistedCount = funnelStage("Shortlisted")?.count ?? 0;\n              const walkinCount = funnelStage("Walked In")?.count ?? 0;',
            'frontend funnel stage lookup')
          text = replace_once(text,
            '              const contactRate = stageRate(contactedCount, totalLogged);\n              const walkinRate = stageRate(walkinCount, contactedCount);',
            '              const contactRate = stageRate(contactedCount, totalLogged);\n              const shortlistRate = stageRate(shortlistedCount, contactedCount);\n              const walkinRate = stageRate(walkinCount, shortlistedCount);',
            'frontend stage rates')
          text = replace_once(text,
            '<div className="grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-6">\n                    <KpiTile label="Total Candidates" value={totalLogged.toLocaleString()} sub="logged candidate records" color="border-slate-300" icon={<Users className="h-4 w-4 text-slate-400" />} />\n                    <KpiTile label="Contacted" value={contactedCount.toLocaleString()} sub={`${contactRate}% of logged`} color="border-cyan-300" icon={<PhoneCall className="h-4 w-4 text-cyan-500" />} />\n                    <KpiTile label="Walk-ins" value={walkinCount.toLocaleString()} sub={`${walkinRate}% of contacted`} color="border-blue-300" icon={<UserRound className="h-4 w-4 text-blue-500" />} />',
            '<div className="grid grid-cols-2 gap-3 md:grid-cols-4 xl:grid-cols-7">\n                    <KpiTile label="Candidate Records" value={totalLogged.toLocaleString()} sub="base candidate entries" color="border-slate-300" icon={<Users className="h-4 w-4 text-slate-400" />} />\n                    <KpiTile label="Contacted" value={contactedCount.toLocaleString()} sub={`${contactRate}% of candidate records`} color="border-cyan-300" icon={<PhoneCall className="h-4 w-4 text-cyan-500" />} />\n                    <KpiTile label="Shortlisted" value={shortlistedCount.toLocaleString()} sub={`${shortlistRate}% of contacted`} color="border-amber-300" icon={<Target className="h-4 w-4 text-amber-500" />} />\n                    <KpiTile label="Walk-ins" value={walkinCount.toLocaleString()} sub={`${walkinRate}% of shortlisted`} color="border-blue-300" icon={<UserRound className="h-4 w-4 text-blue-500" />} />',
            'analytics KPI grid')
          frontend.write_text(text, encoding='utf-8')
          PY
      - name: Validate and commit
        run: |
          npm install --legacy-peer-deps --ignore-scripts
          npm run typecheck
          npm run build
          (cd backend && npm install --ignore-scripts && npm run typecheck)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/src/modules/ats/recruiter-hiring.service.ts src/pages/NativeATSHiringEntry.tsx
          git rm -f .github/workflows/align-ats-kpi-funnel.yml
          git commit -m 'fix(ats): align KPI funnel stages'
          git push origin HEAD:agent/fix-ats-kpi-calculations
