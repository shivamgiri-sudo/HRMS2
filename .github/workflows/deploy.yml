name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  # ── 1. CI Gate (GitHub-hosted) ───────────────────────────────────────────────
  # Runs typecheck + build to catch broken pushes before the deploy runner touches
  # the server.  Uses ubuntu-latest so it doesn't require the server to be online.
  ci-gate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Typecheck backend
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build frontend
        run: bun run build

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── 2. Deploy (self-hosted runner on 192.168.11.225) ─────────────────────────
  # The self-hosted runner runs INSIDE the LAN and has direct access to
  # /var/www/HRMS1 and pm2.  It connects outbound to GitHub — no inbound port
  # needs to be opened.
  #
  # Runner setup: see docs/ci-cd/self-hosted-runner-setup.sh
  deploy:
    name: Deploy to 192.168.11.225
    needs: ci-gate
    runs-on: self-hosted
    timeout-minutes: 15
    environment: production

    steps:
      # Download the artifacts built by ci-gate (avoids rebuilding on server)
      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: /tmp/deploy/backend/dist/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/deploy/dist/

      - name: Copy backend dist to serve dir
        run: |
          rsync -a --delete /tmp/deploy/backend/dist/ /var/www/HRMS1/backend/dist/
          echo "Backend files synced"

      - name: Copy frontend dist to serve dir
        run: |
          rsync -a --delete /tmp/deploy/dist/ /var/www/HRMS1/dist/
          echo "Frontend files synced"

      - name: Restart backend with PM2
        run: |
          pm2 restart hrms-backend --no-color
          sleep 3
          pm2 status hrms-backend --no-color
          pm2 save --no-color

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8004/api/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60 s"
          pm2 logs hrms-backend --lines 50 --no-color
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          COMMIT="${{ github.sha }}"
          echo "## Deployment successful" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${COMMIT:0:8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Server:** 192.168.11.225" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Deployed by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
