name: Assessment MySQL Integration

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/src/modules/ats-assessment/**'
      - 'backend/sql/408_ats_candidate_assessment_engine.sql'
      - '.github/workflows/assessment-mysql-integration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mysql-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: hrms_assessment_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    env:
      NODE_ENV: test
      ACTIVE_DB_PROVIDER: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: hrms_assessment_test
      DB_POOL_MAX: 5
      ATS_ASSESSMENT_ENABLED: 'true'
      ATS_ASSESSMENT_TOKEN_SECRET: assessment-integration-secret-at-least-32-characters
      JWT_SECRET: change-me-jwt-secret-32characters!!
      ENABLE_SCHEDULERS: 'false'
      RUN_ASSESSMENT_MYSQL_TESTS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Create minimal existing ATS schema and run migration twice
        working-directory: backend
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import mysql from 'mysql2/promise';

          const connection = await mysql.createConnection({
            host: process.env.DB_HOST,
            port: Number(process.env.DB_PORT),
            user: process.env.DB_USER,
            password: process.env.DB_PASSWORD,
            database: process.env.DB_NAME,
            multipleStatements: true,
          });

          await connection.query(`
            CREATE TABLE IF NOT EXISTS ats_candidate (
              id CHAR(36) NOT NULL PRIMARY KEY,
              candidate_code VARCHAR(100) NULL,
              full_name VARCHAR(255) NULL,
              mobile VARCHAR(30) NULL,
              branch_display_name VARCHAR(255) NULL,
              applied_for_branch VARCHAR(255) NULL,
              applied_for_process VARCHAR(255) NULL,
              role_applied VARCHAR(255) NULL,
              experience VARCHAR(100) NULL,
              q_token VARCHAR(100) NULL,
              status VARCHAR(100) NULL,
              current_stage VARCHAR(100) NULL,
              created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
              INDEX idx_candidate_mobile (mobile)
            ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

            CREATE TABLE IF NOT EXISTS ats_queue_token (
              id CHAR(36) NOT NULL PRIMARY KEY,
              candidate_id CHAR(36) NOT NULL,
              token VARCHAR(100) NULL,
              token_number VARCHAR(100) NULL,
              status VARCHAR(50) NULL,
              queue_status VARCHAR(50) NULL,
              created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
              updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
              INDEX idx_queue_candidate (candidate_id)
            ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          `);

          const migration = readFileSync('sql/408_ats_candidate_assessment_engine.sql', 'utf8');
          await connection.query(migration);
          await connection.query(migration);
          await connection.end();
          NODE
      - name: Run MySQL lifecycle test
        id: lifecycle
        working-directory: backend
        shell: bash
        run: |
          set +e
          npx vitest run src/modules/ats-assessment/__tests__/assessment.mysql.integration.test.ts \
            > ../assessment-mysql-lifecycle.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat ../assessment-mysql-lifecycle.log
          exit 0
      - name: Upload lifecycle diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: assessment-mysql-lifecycle-diagnostics
          path: assessment-mysql-lifecycle.log
          retention-days: 2
      - name: Enforce lifecycle result
        run: test "${{ steps.lifecycle.outputs.exit_code }}" = "0"
