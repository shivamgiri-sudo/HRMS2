name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint || true
        continue-on-error: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript compiler
        run: bunx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key-for-build' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 7

  finance-integration:
    name: Finance integration patch and validation
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feat/finance-budget-grn-vendor-flow'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout finance feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/finance-budget-grn-vendor-flow
          fetch-depth: 0
          persist-credentials: true

      - name: Detect guarded patch
        id: patch
        shell: bash
        run: |
          if [[ -f .github/scripts/apply_finance_budget_integration.py ]]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.patch.outputs.apply == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Apply guarded finance patch
        id: apply_patch
        if: steps.patch.outputs.apply == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python3 .github/scripts/apply_finance_budget_integration.py > /tmp/finance-patch.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "Finance patch exit code: $code"
          tail -80 /tmp/finance-patch.log
          exit 0

      - name: Report patch failure
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Finance integration patch failed'
            echo
            echo '```text'
            tail -80 /tmp/finance-patch.log
            echo '```'
          } > /tmp/finance-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/finance-comment.md
          exit 1

      - name: Install frontend dependencies
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm ci

      - name: Install backend dependencies
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm --prefix backend ci

      - name: Frontend typecheck
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm run typecheck

      - name: Backend typecheck
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm --prefix backend run typecheck

      - name: Budget tax tests
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm --prefix backend exec vitest run src/modules/process-pnl/__tests__/branch-budget.calculation.test.ts

      - name: Build frontend and backend
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        run: npm run build:all
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key-for-build' }}

      - name: Restore standard CI workflow and commit validated code
        if: steps.patch.outputs.apply == 'true' && steps.apply_patch.outputs.exit_code == '0'
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No validated changes to commit"
            exit 0
          fi
          git commit -m "feat: integrate branch budgets with staged GRN vendor flow"
          git push origin HEAD:feat/finance-budget-grn-vendor-flow
