name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint || true
        continue-on-error: true

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript compiler
        run: bunx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key-for-build' }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 7

  finance-validation:
    name: Finance API and schema contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Backend typecheck
        run: npm --prefix backend run typecheck

      - name: Finance calculation and schema-contract tests
        run: >-
          npm --prefix backend exec -- vitest run
          src/modules/process-pnl/__tests__/branch-budget.calculation.test.ts
          src/modules/process-pnl/__tests__/bpo-pnl.calculation.test.ts
          src/modules/process-pnl/__tests__/bpo-pnl.schema-contract.test.ts
          src/modules/finance/__tests__/finance.schema-contract.test.ts

      - name: Build frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key-for-build' }}

      - name: Build backend
        run: npm --prefix backend run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  finance-validation-report:
    name: Finance validation report
    if: always() && github.event_name == 'push' && startsWith(github.ref_name, 'feat/')
    needs: [finance-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Update draft PR validation comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              per_page: 10,
            });
            if (!pulls.data.length) {
              core.info(`No open pull request found for ${branch}`);
              return;
            }

            const pull = pulls.data[0];
            const result = '${{ needs.finance-validation.result }}';
            const marker = '<!-- finance-validation-status -->';
            const passed = result === 'success';
            const body = [
              marker,
              `## ${passed ? '✅' : '❌'} Finance validation ${passed ? 'passed' : 'failed'}`,
              '',
              `- Result: **${result}**`,
              `- Commit: \`${context.sha.slice(0, 12)}\``,
              `- Checks: frontend typecheck, backend typecheck, branch-budget and BPO P&L calculation tests, finance/BPO schema and API contract tests, frontend build, backend build`,
              `- Workflow: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }
