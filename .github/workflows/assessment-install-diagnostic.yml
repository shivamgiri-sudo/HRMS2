name: Assessment Install Diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Capture npm install output
        id: npm_install
        shell: bash
        run: |
          set +e
          npm ci > npm-install.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 200 npm-install.log
          exit 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Capture Bun install output
        id: bun_install
        shell: bash
        run: |
          set +e
          bun install --frozen-lockfile > bun-install.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -n 200 bun-install.log
          exit 0
      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v4
        with:
          name: assessment-install-diagnostics
          path: |
            npm-install.log
            bun-install.log
          retention-days: 2
      - name: Report diagnostic result
        shell: bash
        run: |
          echo "npm ci exit: ${{ steps.npm_install.outputs.exit_code }}"
          echo "bun frozen install exit: ${{ steps.bun_install.outputs.exit_code }}"
          test "${{ steps.npm_install.outputs.exit_code }}" = "0" && test "${{ steps.bun_install.outputs.exit_code }}" = "0"
