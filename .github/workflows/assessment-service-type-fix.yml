name: Assessment Service Type Fix

on:
  push:
    branches:
      - feat/ats-candidate-assessment-engine

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ats-candidate-assessment-engine
          fetch-depth: 0
      - name: Patch the exact compiler error
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('backend/src/modules/ats-assessment/assessment.service.ts')
          text = path.read_text(encoding='utf-8')
          old = 'const existingResult = parseJson(typing.result_json, null);\n      await connection.commit();\n      return { ...(existingResult as Record<string, unknown>), attemptNo: typing.attempt_no, attemptsRemaining: 2 - typing.attempt_no, alreadySubmitted: true };'
          new = 'const existingResult = parseJson<Record<string, unknown>>(typing.result_json, {});\n      await connection.commit();\n      return { ...existingResult, attemptNo: typing.attempt_no, attemptsRemaining: 2 - typing.attempt_no, alreadySubmitted: true };'
          if old not in text:
              raise SystemExit('Expected compiler-error block was not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/assessment-service-type-fix.yml
      - name: Commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/src/modules/ats-assessment/assessment.service.ts .github/workflows/assessment-service-type-fix.yml
          git commit -m 'fix(ats-assessment): type existing typing result safely'
          git push origin HEAD:feat/ats-candidate-assessment-engine
