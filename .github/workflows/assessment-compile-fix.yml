name: Assessment Compile Fix

on:
  push:
    branches:
      - feat/ats-candidate-assessment-engine

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ats-candidate-assessment-engine
          fetch-depth: 0
      - name: Apply focused fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('backend/src/modules/ats-assessment/assessment.service.ts')
          text = service.read_text(encoding='utf-8')
          old = '''      const existingResult = parseJson(typing.result_json, null);\n      await connection.commit();\n      return { ...(existingResult as Record<string, unknown>), attemptNo: typing.attempt_no, attemptsRemaining: 2 - typing.attempt_no, alreadySubmitted: true };'''
          new = '''      const existingResult = parseJson<Record<string, unknown>>(typing.result_json, {});\n      await connection.commit();\n      return { ...existingResult, attemptNo: typing.attempt_no, attemptsRemaining: 2 - typing.attempt_no, alreadySubmitted: true };'''
          if old not in text:
              raise SystemExit('Expected service block not found')
          service.write_text(text.replace(old, new, 1), encoding='utf-8')

          diagnostic = Path('.github/workflows/assessment-backend-diagnostic.yml')
          workflow = diagnostic.read_text(encoding='utf-8')
          workflow = workflow.replace(
              'npx vitest run src/modules/ats-assessment > ../assessment-backend-tests.log 2>&1',
              'npx vitest run src/modules/ats-assessment/__tests__ > ../assessment-backend-tests.log 2>&1',
          )
          diagnostic.write_text(workflow, encoding='utf-8')
          PY

          mkdir -p backend/src/modules/ats-assessment/__tests__
          for file in assessment.catalog.test.ts typing-scoring.test.ts assessment.pages.test.ts assessment.policy.test.ts; do
            git mv "backend/src/modules/ats-assessment/$file" "backend/src/modules/ats-assessment/__tests__/$file"
            sed -i 's#from "\./assessment#from "../assessment#g' "backend/src/modules/ats-assessment/__tests__/$file"
            sed -i 's#from "\./typing#from "../typing#g' "backend/src/modules/ats-assessment/__tests__/$file"
          done
      - name: Remove one-shot workflow
        run: rm .github/workflows/assessment-compile-fix.yml
      - name: Commit fixes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/src/modules/ats-assessment .github/workflows/assessment-backend-diagnostic.yml .github/workflows/assessment-compile-fix.yml
          git commit -m 'fix(ats-assessment): compile service and discover tests'
          git push origin HEAD:feat/ats-candidate-assessment-engine
