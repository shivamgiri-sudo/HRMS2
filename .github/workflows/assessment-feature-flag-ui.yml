name: Assessment Feature Flag UI

on:
  push:
    branches:
      - feat/ats-candidate-assessment-engine

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ats-candidate-assessment-engine
          fetch-depth: 0
      - name: Gate registration launch by assessment health
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/pages/NativeATSCandidateRegistration.tsx')
          text = path.read_text(encoding='utf-8')

          old = '''  const [submitError, setSubmitError] = useState("");\n  const [result, setResult] = useState<SubmitResponse | null>(null);\n  const [uploadStatus, setUploadStatus] = useState<"idle" | "uploading" | "done" | "failed">("idle");'''
          new = '''  const [submitError, setSubmitError] = useState("");\n  const [result, setResult] = useState<SubmitResponse | null>(null);\n  const [assessmentEnabled, setAssessmentEnabled] = useState(false);\n  const [uploadStatus, setUploadStatus] = useState<"idle" | "uploading" | "done" | "failed">("idle");'''
          if old not in text:
              raise SystemExit('Assessment feature state insertion point not found')
          text = text.replace(old, new, 1)

          old = '''    setLoadingStep(1);\n    setScreen("submitting");\n    setSubmitError("");'''
          new = '''    setLoadingStep(1);\n    setScreen("submitting");\n    setSubmitError("");\n    setAssessmentEnabled(false);'''
          if old not in text:
              raise SystemExit('Registration submit reset point not found')
          text = text.replace(old, new, 1)

          old = '''      setResult(res);\n      setScreen("success");\n\n      // Record DPDP consent (non-blocking)'''
          new = '''      setResult(res);\n      setScreen("success");\n\n      // Assessment availability is checked separately and must never affect\n      // the successful candidate registration flow.\n      void hrmsApi\n        .get<{ success: boolean; data?: { status?: string } }>("/api/ats-ext/assessment/health")\n        .then((health) => setAssessmentEnabled(health.data?.status === "enabled"))\n        .catch(() => setAssessmentEnabled(false));\n\n      // Record DPDP consent (non-blocking)'''
          if old not in text:
              raise SystemExit('Registration success health insertion point not found')
          text = text.replace(old, new, 1)

          old = '''        {result?.tokenNumber && ('''
          new = '''        {result?.tokenNumber && assessmentEnabled && ('''
          if old not in text:
              raise SystemExit('Assessment launch condition not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Remove one-shot workflow
        run: rm .github/workflows/assessment-feature-flag-ui.yml
      - name: Commit feature-gated launch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/pages/NativeATSCandidateRegistration.tsx .github/workflows/assessment-feature-flag-ui.yml
          git commit -m 'fix(ats-assessment): feature-gate registration launch'
          git push origin HEAD:feat/ats-candidate-assessment-engine
